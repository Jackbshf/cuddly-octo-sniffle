backend:
  name: github
  repo: Jackbshf/cuddly-octo-sniffle
  branch: main
  base_url: https://your-decap-oauth.your-subdomain.workers.dev
  auth_endpoint: api/auth
  squash_merges: true

publish_mode: editorial_workflow
media_folder: images/uploads
public_folder: /images/uploads
site_url: https://www.zhangweivisual.cn
display_url: https://www.zhangweivisual.cn
logo_url: /images/微信图片_20260411183220_100_7.jpg

editor:
  preview: false

collections:
  - name: site_meta
    label: 站点 Meta
    delete: false
    files:
      - name: site
        label: 站点 Meta
        file: data/meta.json
        format: json
        fields:
          - { label: Site Title, name: siteTitle, widget: string }
          - { label: Site Description, name: siteDescription, widget: text }
          - { label: Site Keywords, name: siteKeywords, widget: list }
          - { label: Canonical URL, name: canonicalUrl, widget: string }
          - { label: OG Title, name: ogTitle, widget: string }
          - { label: OG Description, name: ogDescription, widget: text }
          - { label: OG Image, name: ogImage, widget: image, required: false }
          - { label: Twitter Card, name: twitterCard, widget: string, default: summary_large_image }
          - { label: Case Section Title, name: caseSectionTitle, widget: string }
          - { label: Case Section Description, name: caseSectionDesc, widget: text }
          - { label: Contact Section Title, name: contactSectionTitle, widget: string }
          - { label: Contact Section Description, name: contactSectionDesc, widget: text }
          - { label: Formspree Endpoint, name: formspreeEndpoint, widget: string, required: false }
          - { label: Contact CTA Label, name: contactCtaLabel, widget: string }

  - name: cases
    label: 案例
    label_singular: 案例
    folder: data/cases
    create: true
    format: json
    extension: json
    slug: "{{fields.id}}"
    summary: "{{fields.title}}"
    fields:
      - { label: ID, name: id, widget: string, hint: "唯一 ID，推荐小写字母 + 连字符" }
      - { label: 标题, name: title, widget: string }
      - { label: 封面, name: cover, widget: image }
      - { label: 分类, name: category, widget: string }
      - { label: 标签, name: tags, widget: list }
      - { label: 描述, name: description, widget: text }
      - label: 结果指标
        name: results
        widget: list
        summary: "{{fields.label}}: {{fields.value}}"
        fields:
          - { label: 字段名, name: label, widget: string }
          - { label: 字段值, name: value, widget: string }
      - { label: 工具链, name: tools, widget: list }
      - label: 关联 Slide ID
        name: slideIds
        widget: list
        field:
          label: Slide ID
          name: slideId
          widget: number
          value_type: int
