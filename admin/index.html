<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portfolio CMS</title>
  <style>
    :root {
      color-scheme: dark;
      font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      background: #0a0b0f;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at top left, rgba(34, 211, 238, 0.16), transparent 28%),
        radial-gradient(circle at bottom right, rgba(99, 102, 241, 0.14), transparent 32%),
        #0a0b0f;
      color: #f6f7fb;
    }

    .boot {
      display: grid;
      place-items: center;
      min-height: 100vh;
      padding: 24px;
      text-align: center;
    }

    .boot-card {
      max-width: 560px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 28px;
      background: rgba(16, 17, 20, 0.86);
      backdrop-filter: blur(24px);
      padding: 28px 26px;
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.45);
    }

    .boot-card h1 {
      margin: 0 0 12px;
      font-size: 28px;
      font-weight: 600;
    }

    .boot-card p {
      margin: 0;
      line-height: 1.8;
      color: rgba(255, 255, 255, 0.72);
    }

    .boot-card code {
      font-family: "Cascadia Code", "SFMono-Regular", Consolas, monospace;
      color: #a5f3fc;
    }
  </style>
</head>
<body>
  <div class="boot">
    <div class="boot-card">
      <h1>Portfolio CMS</h1>
      <p>这里管理 <code>data/meta.json</code> 和 <code>data/cases/*.json</code>。首次启用前，请先把 <code>/admin/config.yml</code> 里的 OAuth Worker 地址替换成你自己的 Cloudflare Worker 域名，再部署后台。</p>
    </div>
  </div>
  <script src="https://unpkg.com/decap-cms@^3.6.4/dist/decap-cms.js"></script>
</body>
</html>
