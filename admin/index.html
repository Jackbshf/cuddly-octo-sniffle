<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Portfolio CMS</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f4f5f1;
      --surface: #ffffff;
      --surface-soft: #eef2ee;
      --line: #d7ded7;
      --line-strong: #b9c5bd;
      --text: #202521;
      --muted: #637068;
      --accent: #0f766e;
      --accent-strong: #0b5f59;
      --danger: #b42318;
      --warn: #9a6700;
      --focus: rgba(15, 118, 110, 0.15);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", Arial, sans-serif;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
    }

    button,
    input,
    textarea {
      font: inherit;
    }

    button {
      min-height: 36px;
      border: 1px solid var(--line-strong);
      border-radius: 8px;
      background: var(--surface);
      color: var(--text);
      cursor: pointer;
      font-weight: 700;
    }

    button:hover { border-color: var(--accent); }
    button:disabled { cursor: not-allowed; opacity: 0.55; }

    .primary {
      border-color: var(--accent);
      background: var(--accent);
      color: #fff;
    }

    .primary:hover { background: var(--accent-strong); }

    .danger {
      border-color: rgba(180, 35, 24, 0.4);
      color: var(--danger);
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      min-height: 72px;
      padding: 14px clamp(16px, 3vw, 32px);
      border-bottom: 1px solid var(--line);
      background: var(--surface);
      position: sticky;
      top: 0;
      z-index: 5;
    }

    .brand h1 {
      margin: 0;
      font-size: 20px;
      line-height: 1.2;
    }

    .brand p {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.4;
    }

    .top-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .top-actions a,
    .top-actions button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 36px;
      padding: 0 12px;
      border: 1px solid var(--line-strong);
      border-radius: 8px;
      background: var(--surface);
      color: var(--text);
      text-decoration: none;
      font-size: 13px;
      font-weight: 700;
    }

    .status {
      min-height: 36px;
      margin: 12px clamp(16px, 3vw, 32px) 0;
      padding: 9px 12px;
      border: 1px solid transparent;
      border-radius: 8px;
      color: var(--muted);
      font-size: 13px;
    }

    .status[data-tone="ok"] {
      border-color: rgba(15, 118, 110, 0.24);
      background: rgba(15, 118, 110, 0.08);
      color: var(--accent-strong);
    }

    .status[data-tone="error"] {
      border-color: rgba(180, 35, 24, 0.24);
      background: rgba(180, 35, 24, 0.08);
      color: var(--danger);
    }

    .status[data-tone="warn"] {
      border-color: rgba(154, 103, 0, 0.24);
      background: rgba(154, 103, 0, 0.08);
      color: var(--warn);
    }

    .workspace {
      display: grid;
      grid-template-columns: minmax(260px, 340px) 1fr;
      gap: 16px;
      padding: 12px clamp(16px, 3vw, 32px) 28px;
    }

    .sidebar,
    .editor {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--surface);
      min-width: 0;
    }

    .sidebar {
      align-self: start;
      position: sticky;
      top: 96px;
      max-height: calc(100vh - 116px);
      overflow: hidden;
      display: grid;
      grid-template-rows: auto 1fr;
    }

    .sidebar-head {
      display: grid;
      gap: 10px;
      padding: 12px;
      border-bottom: 1px solid var(--line);
    }

    .case-search {
      width: 100%;
      height: 38px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 0 10px;
      background: #fff;
      color: var(--text);
    }

    .case-search:focus,
    input:focus,
    textarea:focus {
      outline: 0;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--focus);
    }

    .case-list {
      overflow: auto;
      padding: 8px;
    }

    .case-row {
      width: 100%;
      display: grid;
      gap: 4px;
      min-height: 58px;
      margin: 0 0 6px;
      padding: 10px;
      border: 1px solid transparent;
      border-radius: 8px;
      background: transparent;
      text-align: left;
      font-weight: 500;
    }

    .case-row.active {
      border-color: rgba(15, 118, 110, 0.32);
      background: rgba(15, 118, 110, 0.08);
    }

    .case-row strong {
      overflow-wrap: anywhere;
      font-size: 14px;
      line-height: 1.25;
    }

    .case-row span {
      color: var(--muted);
      font-size: 12px;
      overflow-wrap: anywhere;
    }

    .tabs {
      display: flex;
      gap: 8px;
      padding: 12px;
      border-bottom: 1px solid var(--line);
      background: var(--surface-soft);
    }

    .tab {
      padding: 0 14px;
      border-color: transparent;
      background: transparent;
      min-width: 84px;
    }

    .tab.active {
      border-color: var(--line-strong);
      background: var(--surface);
      color: var(--accent-strong);
    }

    .panel {
      display: none;
      padding: 16px;
    }

    .panel.active { display: block; }

    .panel-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 14px;
    }

    .panel-head h2 {
      margin: 0;
      font-size: 17px;
    }

    .panel-head p {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.5;
    }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .field {
      display: grid;
      gap: 7px;
      min-width: 0;
    }

    .field.full { grid-column: 1 / -1; }

    .field label {
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 0;
    }

    input,
    textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      color: var(--text);
      padding: 9px 10px;
    }

    textarea {
      min-height: 96px;
      resize: vertical;
      line-height: 1.55;
    }

    .actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 14px;
    }

    .cover-tools {
      display: grid;
      grid-template-columns: 160px 1fr;
      gap: 12px;
      align-items: start;
    }

    .cover-drop-zone {
      margin: -8px;
      padding: 8px;
      border: 1px dashed transparent;
      border-radius: 10px;
      transition: border-color 0.16s ease, background 0.16s ease;
    }

    .cover-drop-zone.drag-active {
      border-color: rgba(15, 118, 110, 0.55);
      background: rgba(15, 118, 110, 0.08);
    }

    .cover-preview {
      width: 160px;
      aspect-ratio: 4 / 3;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--surface-soft);
      object-fit: cover;
    }

    .upload-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
    }

    .upload-row input[type="file"] {
      max-width: 100%;
      padding: 7px;
    }

    .drop-hint {
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
    }

    .cover-drop-zone.drag-active .drop-hint {
      color: var(--accent-strong);
      font-weight: 700;
    }

    .empty {
      padding: 16px 10px;
      color: var(--muted);
      font-size: 13px;
      text-align: center;
    }

    @media (max-width: 860px) {
      .topbar { align-items: flex-start; flex-direction: column; }
      .top-actions { justify-content: flex-start; }
      .workspace { grid-template-columns: 1fr; }
      .sidebar { position: static; max-height: 320px; }
      .form-grid { grid-template-columns: 1fr; }
      .cover-tools { grid-template-columns: 1fr; }
      .cover-preview { width: min(100%, 260px); }
    }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <h1>Portfolio CMS</h1>
      <p>管理 data/meta.json、data/cases/*.json 和 images/uploads/，保存后提交到 GitHub。</p>
    </div>
    <div class="top-actions">
      <a href="/" target="_blank" rel="noreferrer">打开网站</a>
      <button id="reloadButton" type="button">刷新</button>
    </div>
  </header>

  <div id="status" class="status" role="status">正在加载 GitHub 内容...</div>

  <main class="workspace">
    <aside class="sidebar">
      <div class="sidebar-head">
        <input id="caseSearch" class="case-search" type="search" placeholder="搜索案例">
        <button id="newCaseButton" class="primary" type="button">新增案例</button>
      </div>
      <div id="caseList" class="case-list"></div>
    </aside>

    <section class="editor">
      <div class="tabs" role="tablist">
        <button id="metaTab" class="tab active" type="button">站点 Meta</button>
        <button id="caseTab" class="tab" type="button">案例编辑</button>
      </div>

      <section id="metaPanel" class="panel active">
        <div class="panel-head">
          <div>
            <h2>站点 Meta</h2>
            <p>这些字段会写入 data/meta.json，并在下一次部署后更新公开站点。</p>
          </div>
          <button id="saveMetaButton" class="primary" type="button">保存 Meta 到 GitHub</button>
        </div>
        <div class="form-grid">
          <div class="field">
            <label for="siteTitle">Site Title</label>
            <input id="siteTitle" autocomplete="off">
          </div>
          <div class="field">
            <label for="canonicalUrl">Canonical URL</label>
            <input id="canonicalUrl" autocomplete="off">
          </div>
          <div class="field full">
            <label for="siteDescription">Site Description</label>
            <textarea id="siteDescription"></textarea>
          </div>
          <div class="field full">
            <label for="siteKeywords">Site Keywords，每行一个</label>
            <textarea id="siteKeywords"></textarea>
          </div>
          <div class="field">
            <label for="ogTitle">OG Title</label>
            <input id="ogTitle" autocomplete="off">
          </div>
          <div class="field">
            <label for="twitterCard">Twitter Card</label>
            <input id="twitterCard" autocomplete="off">
          </div>
          <div class="field full">
            <label for="ogDescription">OG Description</label>
            <textarea id="ogDescription"></textarea>
          </div>
          <div class="field full">
            <label for="ogImage">OG Image</label>
            <input id="ogImage" autocomplete="off">
          </div>
          <div class="field">
            <label for="caseSectionTitle">Case Section Title</label>
            <input id="caseSectionTitle" autocomplete="off">
          </div>
          <div class="field">
            <label for="contactSectionTitle">Contact Section Title</label>
            <input id="contactSectionTitle" autocomplete="off">
          </div>
          <div class="field full">
            <label for="caseSectionDesc">Case Section Description</label>
            <textarea id="caseSectionDesc"></textarea>
          </div>
          <div class="field full">
            <label for="contactSectionDesc">Contact Section Description</label>
            <textarea id="contactSectionDesc"></textarea>
          </div>
          <div class="field">
            <label for="formspreeEndpoint">Formspree Endpoint</label>
            <input id="formspreeEndpoint" autocomplete="off">
          </div>
          <div class="field">
            <label for="contactCtaLabel">Contact CTA Label</label>
            <input id="contactCtaLabel" autocomplete="off">
          </div>
        </div>
      </section>

      <section id="casePanel" class="panel">
        <div class="panel-head">
          <div>
            <h2>案例编辑</h2>
            <p>新增、修改或删除案例会写入 data/cases/*.json。删除只删除索引文件，不清理已上传图片。</p>
          </div>
          <div class="actions">
            <button id="saveCaseButton" class="primary" type="button">保存案例到 GitHub</button>
            <button id="deleteCaseButton" class="danger" type="button">删除案例</button>
          </div>
        </div>

        <div class="form-grid">
          <div class="field">
            <label for="caseId">ID</label>
            <input id="caseId" autocomplete="off">
          </div>
          <div class="field">
            <label for="caseCategory">分类</label>
            <input id="caseCategory" autocomplete="off">
          </div>
          <div class="field full">
            <label for="caseTitle">标题</label>
            <input id="caseTitle" autocomplete="off">
          </div>
          <div class="field full">
            <label for="caseDescription">描述</label>
            <textarea id="caseDescription"></textarea>
          </div>
          <div class="field full">
            <label for="caseCover">封面路径</label>
            <div id="coverDropZone" class="cover-tools cover-drop-zone">
              <img id="coverPreview" class="cover-preview" alt="">
              <div>
                <input id="caseCover" autocomplete="off">
                <div class="upload-row" style="margin-top: 8px;">
                  <input id="coverFile" type="file" accept="image/jpeg,image/png,image/webp,image/gif,image/svg+xml">
                  <button id="uploadCoverButton" type="button">上传封面</button>
                </div>
                <p id="coverDropHint" class="drop-hint">可将封面图片拖到这里，上传后再保存案例。</p>
              </div>
            </div>
          </div>
          <div class="field full">
            <label for="caseTags">标签，每行一个</label>
            <textarea id="caseTags"></textarea>
          </div>
          <div class="field full">
            <label for="caseResults">结果指标，每行使用 label: value</label>
            <textarea id="caseResults"></textarea>
          </div>
          <div class="field full">
            <label for="caseTools">工具链，每行一个</label>
            <textarea id="caseTools"></textarea>
          </div>
          <div class="field full">
            <label for="caseSlideIds">关联 Slide ID，逗号或换行分隔</label>
            <textarea id="caseSlideIds"></textarea>
          </div>
        </div>
      </section>
    </section>
  </main>

  <script>
    const API_BASE = "/api/portfolio-admin";
    const statusEl = document.getElementById("status");
    const state = {
      meta: {},
      cases: [],
      selectedId: "",
      originalId: "",
      activePanel: "meta",
      busy: false
    };
    const ACCEPTED_COVER_TYPES = ["image/jpeg", "image/png", "image/webp", "image/gif", "image/svg+xml"];
    const ACCEPTED_COVER_EXTENSIONS = /\.(jpe?g|png|webp|gif|svg)$/i;

    const fields = {
      siteTitle: document.getElementById("siteTitle"),
      siteDescription: document.getElementById("siteDescription"),
      siteKeywords: document.getElementById("siteKeywords"),
      canonicalUrl: document.getElementById("canonicalUrl"),
      ogTitle: document.getElementById("ogTitle"),
      ogDescription: document.getElementById("ogDescription"),
      ogImage: document.getElementById("ogImage"),
      twitterCard: document.getElementById("twitterCard"),
      caseSectionTitle: document.getElementById("caseSectionTitle"),
      caseSectionDesc: document.getElementById("caseSectionDesc"),
      contactSectionTitle: document.getElementById("contactSectionTitle"),
      contactSectionDesc: document.getElementById("contactSectionDesc"),
      formspreeEndpoint: document.getElementById("formspreeEndpoint"),
      contactCtaLabel: document.getElementById("contactCtaLabel"),
      caseId: document.getElementById("caseId"),
      caseTitle: document.getElementById("caseTitle"),
      caseCover: document.getElementById("caseCover"),
      caseCategory: document.getElementById("caseCategory"),
      caseTags: document.getElementById("caseTags"),
      caseDescription: document.getElementById("caseDescription"),
      caseResults: document.getElementById("caseResults"),
      caseTools: document.getElementById("caseTools"),
      caseSlideIds: document.getElementById("caseSlideIds")
    };

    const caseList = document.getElementById("caseList");
    const coverPreview = document.getElementById("coverPreview");
    const coverFile = document.getElementById("coverFile");
    const coverDropZone = document.getElementById("coverDropZone");

    document.getElementById("reloadButton").addEventListener("click", loadContent);
    document.getElementById("newCaseButton").addEventListener("click", createCase);
    document.getElementById("saveMetaButton").addEventListener("click", saveMeta);
    document.getElementById("saveCaseButton").addEventListener("click", saveCase);
    document.getElementById("deleteCaseButton").addEventListener("click", deleteCase);
    document.getElementById("uploadCoverButton").addEventListener("click", uploadCover);
    document.getElementById("caseSearch").addEventListener("input", renderCaseList);
    document.getElementById("caseCover").addEventListener("input", updateCoverPreview);
    document.getElementById("metaTab").addEventListener("click", () => setPanel("meta"));
    document.getElementById("caseTab").addEventListener("click", () => setPanel("case"));
    bindCoverDropZone();

    loadContent();

    async function loadContent() {
      setBusy(true);
      showStatus("正在从 GitHub 读取 Portfolio 内容...", "warn");
      try {
        const data = await requestJson("/content");
        state.meta = data.meta || {};
        state.cases = Array.isArray(data.cases) ? data.cases : [];
        state.selectedId = state.cases[0]?.id || "";
        state.originalId = state.selectedId;
        fillMetaForm();
        fillCaseForm(getSelectedCase());
        renderCaseList();
        showStatus("已加载 GitHub 当前内容。", "ok");
      } catch (error) {
        showStatus(error.message || "加载失败。", "error");
      } finally {
        setBusy(false);
      }
    }

    async function saveMeta() {
      const meta = collectMetaForm();
      const secret = findSecretLikeText(JSON.stringify(meta));
      if (secret) {
        showStatus("内容里疑似包含密钥，已阻止发布。", "error");
        return;
      }

      setBusy(true);
      showStatus("正在提交 data/meta.json 到 GitHub...", "warn");
      try {
        const data = await requestJson("/meta", {
          method: "POST",
          body: JSON.stringify({ meta, message: "Update portfolio meta" })
        });
        state.meta = meta;
        showStatus(`Meta 已提交到 GitHub${data.commit ? `：${data.commit.slice(0, 7)}` : ""}，等待 Actions 部署。`, "ok");
      } catch (error) {
        showStatus(error.message || "保存 Meta 失败。", "error");
      } finally {
        setBusy(false);
      }
    }

    async function saveCase() {
      const caseItem = collectCaseForm();
      if (!caseItem.id) {
        showStatus("案例 ID 不能为空。", "error");
        fields.caseId.focus();
        return;
      }

      const secret = findSecretLikeText(JSON.stringify(caseItem));
      if (secret) {
        showStatus("内容里疑似包含密钥，已阻止发布。", "error");
        return;
      }

      setBusy(true);
      showStatus(`正在提交案例 ${caseItem.id} 到 GitHub...`, "warn");
      try {
        const data = await requestJson("/cases", {
          method: "POST",
          body: JSON.stringify({
            caseItem,
            previousId: state.originalId,
            message: `Update portfolio case ${caseItem.id}`
          })
        });
        upsertCase(data.caseItem || caseItem);
        state.selectedId = (data.caseItem || caseItem).id;
        state.originalId = state.selectedId;
        renderCaseList();
        fillCaseForm(getSelectedCase());
        showStatus(`案例已提交到 GitHub${data.commit ? `：${data.commit.slice(0, 7)}` : ""}，等待 Actions 部署。`, "ok");
      } catch (error) {
        showStatus(error.message || "保存案例失败。", "error");
      } finally {
        setBusy(false);
      }
    }

    async function deleteCase() {
      const current = getSelectedCase();
      if (!current?.id) {
        showStatus("没有可删除的案例。", "error");
        return;
      }

      if (!confirm(`确认删除案例 ${current.title || current.id}？这不会删除已经上传到 GitHub 的图片。`)) return;

      setBusy(true);
      showStatus(`正在从 GitHub 删除 ${current.id}.json...`, "warn");
      try {
        await requestJson(`/cases/${encodeURIComponent(current.id)}`, { method: "DELETE" });
        state.cases = state.cases.filter((item) => item.id !== current.id);
        state.selectedId = state.cases[0]?.id || "";
        state.originalId = state.selectedId;
        renderCaseList();
        fillCaseForm(getSelectedCase());
        showStatus("案例索引已删除，等待 Actions 部署。", "ok");
      } catch (error) {
        showStatus(error.message || "删除案例失败。", "error");
      } finally {
        setBusy(false);
      }
    }

    async function uploadCover() {
      const file = coverFile.files?.[0];
      await uploadCoverFile(file, "请先选择一张封面图片。");
    }

    async function uploadCoverFile(file, emptyMessage = "请拖入一张封面图片。") {
      if (state.busy) return;
      const validationError = getCoverFileValidationError(file, emptyMessage);
      if (validationError) {
        showStatus(validationError, "error");
        return;
      }

      const form = new FormData();
      form.append("file", file);
      form.append("title", fields.caseTitle.value || file.name);
      form.append("category", fields.caseCategory.value || "portfolio-cover");

      setBusy(true);
      showStatus("正在上传封面到 GitHub images/uploads/ ...", "warn");
      try {
        const data = await requestJson("/uploads", { method: "POST", body: form });
        const uploaded = data.upload || {};
        fields.caseCover.value = uploaded.relativePath || uploaded.path || uploaded.src || "";
        updateCoverPreview();
        showStatus("封面已上传到 GitHub，请保存案例以引用这张封面。", "ok");
      } catch (error) {
        showStatus(error.message || "上传封面失败。", "error");
      } finally {
        setBusy(false);
      }
    }

    function bindCoverDropZone() {
      if (!coverDropZone) return;

      const hasFile = (event) => Array.from(event.dataTransfer?.types || []).includes("Files");
      const setDropState = (isActive) => coverDropZone.classList.toggle("drag-active", isActive);

      ["dragenter", "dragover"].forEach((eventName) => {
        coverDropZone.addEventListener(eventName, (event) => {
          if (!hasFile(event)) return;
          event.preventDefault();
          event.stopPropagation();
          if (!state.busy) event.dataTransfer.dropEffect = "copy";
          setDropState(!state.busy);
        });
      });

      ["dragleave", "dragend"].forEach((eventName) => {
        coverDropZone.addEventListener(eventName, (event) => {
          if (!hasFile(event)) return;
          event.preventDefault();
          event.stopPropagation();
          setDropState(false);
        });
      });

      coverDropZone.addEventListener("drop", async (event) => {
        if (!hasFile(event)) return;
        event.preventDefault();
        event.stopPropagation();
        setDropState(false);
        const file = getFirstDroppedFile(event.dataTransfer);
        await uploadCoverFile(file, "请拖入一张封面图片。");
      });
    }

    function getFirstDroppedFile(dataTransfer) {
      return Array.from(dataTransfer?.files || [])[0] || null;
    }

    function getCoverFileValidationError(file, emptyMessage) {
      if (!(file instanceof File)) return emptyMessage;
      if (!file.size) return "封面图片不能为空文件。";
      const type = String(file.type || "").toLowerCase();
      const name = String(file.name || "");
      if (!ACCEPTED_COVER_TYPES.includes(type) && !ACCEPTED_COVER_EXTENSIONS.test(name)) {
        return "只支持 jpg、png、webp、gif 或 svg 封面图片。";
      }
      return "";
    }

    async function requestJson(path, options = {}) {
      const headers = new Headers(options.headers || {});
      const body = options.body;
      if (body && !(body instanceof FormData) && !headers.has("Content-Type")) {
        headers.set("Content-Type", "application/json");
      }

      const response = await fetch(`${API_BASE}${path}`, {
        ...options,
        headers,
        cache: "no-store"
      });
      const data = await response.json().catch(() => ({}));
      if (!response.ok || data.ok === false) {
        throw new Error(data.error || `HTTP ${response.status}`);
      }
      return data;
    }

    function setPanel(panel) {
      state.activePanel = panel;
      document.getElementById("metaPanel").classList.toggle("active", panel === "meta");
      document.getElementById("casePanel").classList.toggle("active", panel === "case");
      document.getElementById("metaTab").classList.toggle("active", panel === "meta");
      document.getElementById("caseTab").classList.toggle("active", panel === "case");
    }

    function fillMetaForm() {
      for (const key of [
        "siteTitle",
        "siteDescription",
        "canonicalUrl",
        "ogTitle",
        "ogDescription",
        "ogImage",
        "twitterCard",
        "caseSectionTitle",
        "caseSectionDesc",
        "contactSectionTitle",
        "contactSectionDesc",
        "formspreeEndpoint",
        "contactCtaLabel"
      ]) {
        fields[key].value = state.meta?.[key] || "";
      }
      fields.siteKeywords.value = arrayText(state.meta?.siteKeywords);
    }

    function collectMetaForm() {
      return {
        ...state.meta,
        siteTitle: fields.siteTitle.value.trim(),
        siteDescription: fields.siteDescription.value.trim(),
        siteKeywords: lines(fields.siteKeywords.value),
        canonicalUrl: fields.canonicalUrl.value.trim(),
        ogTitle: fields.ogTitle.value.trim(),
        ogDescription: fields.ogDescription.value.trim(),
        ogImage: trimPath(fields.ogImage.value),
        twitterCard: fields.twitterCard.value.trim() || "summary_large_image",
        caseSectionTitle: fields.caseSectionTitle.value.trim(),
        caseSectionDesc: fields.caseSectionDesc.value.trim(),
        contactSectionTitle: fields.contactSectionTitle.value.trim(),
        contactSectionDesc: fields.contactSectionDesc.value.trim(),
        formspreeEndpoint: fields.formspreeEndpoint.value.trim(),
        contactCtaLabel: fields.contactCtaLabel.value.trim()
      };
    }

    function fillCaseForm(caseItem) {
      const item = caseItem || blankCase();
      fields.caseId.value = item.id || "";
      fields.caseTitle.value = item.title || "";
      fields.caseCover.value = item.cover || "";
      fields.caseCategory.value = item.category || "";
      fields.caseTags.value = arrayText(item.tags);
      fields.caseDescription.value = item.description || "";
      fields.caseResults.value = resultsText(item.results);
      fields.caseTools.value = arrayText(item.tools);
      fields.caseSlideIds.value = arrayText(item.slideIds);
      updateCoverPreview();
      document.getElementById("deleteCaseButton").disabled = !caseItem?.id;
    }

    function collectCaseForm() {
      return {
        id: slug(fields.caseId.value),
        title: fields.caseTitle.value.trim(),
        cover: trimPath(fields.caseCover.value),
        category: fields.caseCategory.value.trim(),
        tags: lines(fields.caseTags.value),
        description: fields.caseDescription.value.trim(),
        results: parseResults(fields.caseResults.value),
        tools: lines(fields.caseTools.value),
        slideIds: lines(fields.caseSlideIds.value).map(Number).filter(Number.isFinite)
      };
    }

    function createCase() {
      const id = `case-${Date.now().toString(36)}`;
      const item = {
        id,
        title: "未命名案例",
        cover: "",
        category: "未分类",
        tags: [],
        description: "",
        results: [],
        tools: [],
        slideIds: []
      };
      state.cases.unshift(item);
      state.selectedId = id;
      state.originalId = "";
      renderCaseList();
      fillCaseForm(item);
      setPanel("case");
      fields.caseTitle.focus();
    }

    function getSelectedCase() {
      return state.cases.find((item) => item.id === state.selectedId) || null;
    }

    function upsertCase(caseItem) {
      const next = state.cases.filter((item) => item.id !== state.originalId && item.id !== caseItem.id);
      next.unshift(caseItem);
      state.cases = next.sort((a, b) => String(a.title || a.id).localeCompare(String(b.title || b.id), "zh-CN"));
    }

    function renderCaseList() {
      const query = document.getElementById("caseSearch").value.trim().toLowerCase();
      const items = state.cases.filter((item) => {
        const haystack = [item.id, item.title, item.category, ...(item.tags || [])].join(" ").toLowerCase();
        return !query || haystack.includes(query);
      });

      if (!items.length) {
        caseList.innerHTML = '<div class="empty">没有匹配的案例</div>';
        return;
      }

      caseList.innerHTML = items.map((item) => `
        <button class="case-row ${item.id === state.selectedId ? "active" : ""}" type="button" data-id="${escapeHtml(item.id)}">
          <strong>${escapeHtml(item.title || item.id)}</strong>
          <span>${escapeHtml(item.category || "未分类")} · ${escapeHtml(item.id)}</span>
        </button>
      `).join("");

      caseList.querySelectorAll(".case-row").forEach((button) => {
        button.addEventListener("click", () => {
          state.selectedId = button.dataset.id;
          state.originalId = state.selectedId;
          fillCaseForm(getSelectedCase());
          renderCaseList();
          setPanel("case");
        });
      });
    }

    function updateCoverPreview() {
      const value = fields.caseCover.value.trim();
      coverPreview.src = value ? (value.startsWith("http") || value.startsWith("/") ? value : `/${value}`) : "";
    }

    function setBusy(isBusy) {
      state.busy = isBusy;
      document.querySelectorAll("button, input, textarea").forEach((element) => {
        if (element.id === "caseSearch") return;
        element.disabled = isBusy;
      });
      document.getElementById("deleteCaseButton").disabled = isBusy || !getSelectedCase()?.id;
    }

    function showStatus(message, tone = "") {
      statusEl.textContent = message;
      statusEl.dataset.tone = tone;
    }

    function lines(value) {
      return String(value || "")
        .split(/[,，\n]/)
        .map((item) => item.trim())
        .filter(Boolean);
    }

    function arrayText(value) {
      return Array.isArray(value) ? value.join("\n") : String(value || "");
    }

    function resultsText(value) {
      if (Array.isArray(value)) {
        return value.map((item) => `${item.label || ""}: ${item.value || ""}`.trim()).join("\n");
      }
      if (value && typeof value === "object") {
        return Object.entries(value).map(([key, val]) => `${key}: ${val}`).join("\n");
      }
      return "";
    }

    function parseResults(value) {
      return String(value || "")
        .split(/\n/)
        .map((line) => line.trim())
        .filter(Boolean)
        .map((line) => {
          const match = line.match(/^([^:=：]+)[:=：](.*)$/);
          return match
            ? { label: match[1].trim(), value: match[2].trim() }
            : { label: line, value: "" };
        });
    }

    function trimPath(value) {
      const text = String(value || "").trim();
      if (/^https?:\/\//i.test(text)) return text;
      return text.replace(/^[./]+/, "").replace(/\\/g, "/");
    }

    function slug(value) {
      return String(value || "")
        .toLowerCase()
        .trim()
        .replace(/[^a-z0-9_-]/g, "-")
        .replace(/-+/g, "-")
        .replace(/^-|-$/g, "");
    }

    function blankCase() {
      return {
        id: "",
        title: "",
        cover: "",
        category: "",
        tags: [],
        description: "",
        results: [],
        tools: [],
        slideIds: []
      };
    }

    function findSecretLikeText(text) {
      const patterns = [
        new RegExp("sk-" + "proj-", "i"),
        /\bsk-[A-Za-z0-9_-]{20,}\b/i,
        new RegExp("github" + "_pat_", "i"),
        new RegExp("\\bgh" + "p_[A-Za-z0-9_]{20,}\\b", "i")
      ];
      return patterns.find((pattern) => pattern.test(text));
    }

    function escapeHtml(value) {
      return String(value || "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }
  </script>
</body>
</html>
