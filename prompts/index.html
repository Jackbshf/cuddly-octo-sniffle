  <style>

    input:focus,textarea:focus,select:focus{border-color:rgba(255,138,42,.78);box-shadow:0 0 0 3px rgba(255,138,42,.14)}
    header{position:sticky;top:0;z-index:30;border-bottom:1px solid rgba(255,255,255,.08);background:rgba(11,16,23,.88);backdrop-filter:blur(14px)}
    .top{max-width:1440px;margin:auto;padding:14px 22px;display:flex;justify-content:space-between;gap:16px;align-items:center}
    .brand{min-width:0}
    .brand h1{margin:0;font-size:20px;line-height:1.2;letter-spacing:0}
    .brand p{margin:4px 0 0;color:var(--muted);font-size:13px}
    .top-actions{display:flex;gap:8px;align-items:center;flex-wrap:wrap;justify-content:flex-end}
    main{max-width:1440px;margin:auto;padding:24px 22px 56px}
    .hero{display:grid;grid-template-columns:minmax(0,1fr) 360px;gap:18px;align-items:stretch;margin-bottom:18px}
    .search-panel,.side-panel,.filter-panel,.result-panel,.pack-card,.prompt-card,.suggestion-card,.admin-panel,dialog{
      border:1px solid rgba(255,255,255,.09);border-radius:var(--r);background:rgba(21,28,39,.94);box-shadow:var(--shadow)

    .prompt-card h3{margin:0;font-size:17px;line-height:1.34}
    .summary{margin:0;color:#b7c3d3;font-size:13px;line-height:1.65}
    .meta{display:flex;gap:7px;flex-wrap:wrap;align-items:center}
    .card-actions{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:auto}
    .landing{display:grid;gap:18px}
    .landing-section{display:grid;gap:12px}
    .landing-head{display:flex;justify-content:space-between;gap:12px;align-items:end}
    .landing-head h3{margin:0;font-size:18px}
    .landing-head p{margin:0;color:var(--muted);font-size:13px}
    .pack-card{padding:16px;display:grid;gap:12px;box-shadow:none}
    .pack-card h4{margin:0;font-size:17px}
    .pack-card p{margin:0;color:#b7c3d3;font-size:13px}
    .suggestion-card{padding:14px;display:grid;gap:10px;box-shadow:none}
    .suggestion-card h4{margin:0;font-size:15px}
    .suggestion-card p{margin:0;color:#b7c3d3;font-size:13px}
    .empty{border:1px dashed var(--line);border-radius:var(--r);padding:34px;text-align:center;color:var(--muted);background:#0f1622}
    .empty strong{display:block;color:#fff;font-size:18px;margin-bottom:6px}
    .admin-panel{padding:14px;margin-bottom:14px;display:grid;gap:12px;box-shadow:none;border-color:rgba(51,199,165,.26)}
    .admin-row{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
    dialog{width:min(980px,calc(100vw - 28px));max-height:calc(100vh - 28px);padding:0;color:var(--text)}
    dialog::backdrop{background:rgba(3,7,12,.72);backdrop-filter:blur(4px)}
    .dh,.df{padding:14px 16px;border-bottom:1px solid var(--line);background:#101722;display:flex;justify-content:space-between;gap:10px;align-items:center}
    .dh h3{margin:0;font-size:18px}
    .db{padding:16px;max-height:calc(100vh - 160px);overflow:auto}
    .df{border-top:1px solid var(--line);border-bottom:0;justify-content:flex-end}
    .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    .full{grid-column:1/-1}
    pre{margin:0;white-space:pre-wrap;word-break:break-word;border:1px solid var(--line);border-radius:var(--r);background:#0b1017;padding:14px;color:#e4ebf5;font:13px/1.7 "Microsoft YaHei",Arial,sans-serif;max-height:52vh;overflow:auto}
    .toast{position:fixed;right:18px;bottom:18px;z-index:80;max-width:min(520px,calc(100vw - 36px));padding:12px 14px;border:1px solid #37455a;border-radius:var(--r);background:#111925;color:#fff;box-shadow:var(--shadow);opacity:0;transform:translateY(10px);transition:.16s;pointer-events:none;font-size:13px}
    .toast.show{opacity:1;transform:translateY(0)}
    @media(max-width:1040px){.hero{grid-template-columns:1fr}.workspace{grid-template-columns:1fr}.filter-panel{position:static}.search-copy h2{font-size:34px}}
    @media(max-width:640px){
      .top{padding:12px 14px;align-items:flex-start}.top-actions{width:100%;justify-content:flex-start}.brand h1{font-size:18px}
      main{padding:14px 12px 36px}.search-panel{padding:18px;min-height:0}.search-copy h2{font-size:27px}.search-copy p{font-size:14px}
      .search-row{grid-template-columns:1fr}.search-row input{min-height:52px}.side-panel{display:none}
      .filter-panel{padding:12px}.result-panel{padding:12px}.result-title{align-items:flex-start;flex-direction:column}
      .grid{grid-template-columns:1fr}.prompt-card{min-height:0}.card-actions{grid-template-columns:1fr 1fr}
      .form-grid{grid-template-columns:1fr}.df{display:grid;grid-template-columns:1fr 1fr}.df button{width:100%}
      .metric-grid{grid-template-columns:1fr 1fr}
    }
  </style>
</head>
<body>
  <header>
    <div class="top">
      <div class="brand">
        <h1>AI 提示词搜索工作台 <span class="badge" id="modeBadge"></span></h1>
        <p id="topSummary">输入需求后再展开结果，避免首页堆满提示词。</p>
      </div>
      <div class="top-actions">
        <button class="quiet" id="managePortal" hidden>管理订阅</button>
        <a class="buttonlike" href="/prompts/admin/" id="adminLink">后台</a>
      </div>
    </div>
  </header>

  <main>
    <section class="hero">
      <div class="search-panel">
        <div class="search-copy">
          <h2>搜索一个具体创作任务，再拿到可复制的提示词。</h2>
          <p>面向图像、视频、音频、多模态、电商和短视频的 AIGC 提示词库。先输入关键词，再按工具、模态、免费/Pro 和精选包过滤。</p>
        </div>
        <div class="search-row">
          <input id="search" type="search" autocomplete="off" placeholder="例如：电商短视频开头、商品图一致性、Runway 分镜、Suno 品牌口播">
          <button class="primary" id="runSearch">搜索</button>
          <button id="clearSearch">清空</button>
        </div>
        <div class="chips" id="hotKeywords"></div>
      </div>
      <aside class="side-panel">
        <h3>库状态</h3>
        <div class="metric-grid" id="metrics"></div>
        <div class="chips" id="entitlementBadges"></div>
        <button class="primary" id="buyPro">开通 Pro 会员</button>
      </aside>
    </section>

    <section class="workspace">
      <aside class="filter-panel">
        <h3>筛选</h3>
        <label class="field">工具<select id="toolFilter"></select></label>
        <label class="field">模态<select id="modalityFilter"></select></label>
        <label class="field">访问<select id="accessFilter">
          <option value="all">全部</option>
          <option value="free">免费</option>
          <option value="pro">Pro</option>
          <option value="pack">精选包</option>
        </select></label>
        <label class="field">精选包<select id="packFilter"></select></label>
        <label class="field">排序<select id="sortFilter">
          <option value="relevance">相关性</option>
          <option value="quality">质量评分</option>
          <option value="newest">最近验证</option>
        </select></label>
        <div class="chips" id="savedChips"></div>
      </aside>

      <section class="result-panel">
        <div class="admin-panel" id="adminPanel" hidden>
          <div class="admin-row">
            <h3>管理员草稿</h3>
            <span class="badge" id="dirtyBadge">无本地草稿</span>
          </div>
          <div class="admin-row">
            <button class="primary" id="newPrompt">新增提示词</button>
            <button id="publishLibrary">发布到 GitHub</button>
            <button id="openSuggestionReview">联网建议审核池</button>
          </div>
        </div>
        <div class="result-title">
          <div>
            <h3 id="resultHeading">先搜索，再浏览结果</h3>
            <p id="resultSub">首页只保留搜索入口、热门关键词、精选包和联网趋势建议。</p>
          </div>
          <div class="chips" id="activeFilters"></div>
        </div>
        <div id="content"><div class="empty"><strong>正在加载提示词库</strong>请稍候。</div></div>
      </section>
    </section>
  </main>

  <dialog id="detailDialog">
    <div class="dh"><h3 id="detailTitle">提示词详情</h3><button type="button" data-close="detailDialog">关闭</button></div>
    <div class="db" id="detailBody"></div>
    <div class="df"><button type="button" data-close="detailDialog">关闭</button><button class="primary" id="detailCopy">复制提示词</button></div>
  </dialog>

  <dialog id="editorDialog">
    <form method="dialog" id="editorForm">
      <div class="dh"><h3 id="editorTitle">编辑提示词</h3><button type="button" data-close="editorDialog">关闭</button></div>
      <div class="db">
        <input type="hidden" name="id">
        <div class="form-grid">
          <label class="field">标题<input name="title" required></label>
          <label class="field">分类<input name="category" required></label>
          <label class="field">状态<input name="status" placeholder="推荐 / 待验证"></label>
          <label class="field">来源<input name="source" placeholder="手动新增"></label>
          <label class="field">访问<select name="access"><option value="free">free</option><option value="pro">pro</option><option value="pack">pack</option></select></label>
          <label class="field">精选包 ID<input name="packId" placeholder="video-commerce-pro"></label>
          <label class="field">Stripe Price ID<input name="stripePriceId" placeholder="可留空，生产用 Worker env 映射"></label>
          <label class="field">质量评分<input name="qualityScore" type="number" min="1" max="100"></label>
          <label class="field">来源类型<input name="sourceType" placeholder="curated / generated-library"></label>
          <label class="field">验证时间<input name="verifiedAt" placeholder="2026-05-15"></label>
          <label class="field full">标签，逗号分隔<input name="tags"></label>
          <label class="field full">变量，逗号分隔<input name="variables"></label>
          <label class="field full">SEO 关键词，逗号分隔<input name="seoKeywords"></label>
          <label class="field full">示例输出<textarea name="exampleOutput" rows="3"></textarea></label>
          <label class="field full">摘要<textarea name="summary" rows="3"></textarea></label>
          <label class="field full">提示词正文<textarea name="body" required rows="14"></textarea></label>
        </div>
      </div>
      <div class="df"><button type="button" data-close="editorDialog">取消</button><button class="primary" type="submit">保存到草稿</button></div>
    </form>
  </dialog>

  <dialog id="suggestionDialog">
    <div class="dh"><h3>联网建议审核池</h3><button type="button" data-close="suggestionDialog">关闭</button></div>
    <div class="db" id="suggestionBody"></div>
    <div class="df"><button type="button" data-close="suggestionDialog">关闭</button></div>
  </dialog>

  <div class="toast" id="toast"></div>

  <script>
const API_LIBRARY="/api/prompts/library";
const API_INDEX="/prompts-data/search-index.json";
const API_SUGGESTIONS="/prompts-data/web-suggestions.json";
const API_CHECKOUT="/api/prompts/checkout";
const API_CONFIRM="/api/prompts/checkout/confirm";
const API_ENTITLEMENT="/api/prompts/entitlement";
const API_PORTAL="/api/prompts/customer-portal";
const IS_ADMIN=location.pathname.replace(/\/+$/,"").startsWith("/prompts/admin");
const FAVORITE_KEY="prompt-commerce-favorites-v1";
const SEARCHES_KEY="prompt-commerce-searches-v1";
const qs=new URLSearchParams(location.search);
const state={query:qs.get("q")||"",tool:qs.get("tool")||"all",modality:qs.get("mod")||"all",access:qs.get("access")||"all",pack:qs.get("pack")||"all",sort:qs.get("sort")||"relevance"};
let store={version:2,prompts:[],assets:[]},indexData={packs:[],prompts:[]},suggestions={suggestions:[]},entitlement={pro:false,packs:[]};
let dirty=false,activeDetailId="",lastResults=[];
const $=id=>document.getElementById(id);
const E={mode:$("modeBadge"),summary:$("topSummary"),search:$("search"),hot:$("hotKeywords"),metrics:$("metrics"),ent:$("entitlementBadges"),tool:$("toolFilter"),mod:$("modalityFilter"),access:$("accessFilter"),pack:$("packFilter"),sort:$("sortFilter"),saved:$("savedChips"),filters:$("activeFilters"),heading:$("resultHeading"),sub:$("resultSub"),content:$("content"),admin:$("adminPanel"),dirty:$("dirtyBadge"),toast:$("toast"),detail:$("detailDialog"),detailTitle:$("detailTitle"),detailBody:$("detailBody"),detailCopy:$("detailCopy"),editor:$("editorDialog"),editorForm:$("editorForm"),editorTitle:$("editorTitle"),suggestions:$("suggestionDialog"),suggestionBody:$("suggestionBody")};
const esc=value=>String(value??"").replace(/[&<>"']/g,ch=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[ch]));
const arr=value=>Array.isArray(value)?value:String(value||"").split(/[,，、\n]/).map(x=>x.trim()).filter(Boolean);
const now=()=>new Date().toISOString();
const promptById=id=>store.prompts.find(prompt=>prompt.id===id);
const indexById=id=>indexData.prompts.find(prompt=>prompt.id===id);
const packs=()=>Array.isArray(indexData.packs)?indexData.packs:[];
const packById=id=>packs().find(pack=>pack.id===id);
const favorites=()=>new Set(JSON.parse(localStorage.getItem(FAVORITE_KEY)||"[]"));
const saveFavorites=set=>localStorage.setItem(FAVORITE_KEY,JSON.stringify([...set].slice(0,200)));
const savedSearches=()=>JSON.parse(localStorage.getItem(SEARCHES_KEY)||"[]");
const saveSearch=query=>{let q=String(query||"").trim();if(!q)return;localStorage.setItem(SEARCHES_KEY,JSON.stringify([q,...savedSearches().filter(x=>x!==q)].slice(0,8)))};
function toast(message){E.toast.textContent=message;E.toast.classList.add("show");clearTimeout(toast.t);toast.t=setTimeout(()=>E.toast.classList.remove("show"),2200)}
function normalizePrompt(prompt,index=0){return{ id:String(prompt.id||`prompt-${index}`),title:String(prompt.title||"未命名提示词"),category:String(prompt.category||"未分类"),tags:arr(prompt.tags),variables:arr(prompt.variables),status:String(prompt.status||"待验证"),summary:String(prompt.summary||""),body:String(prompt.body||""),source:String(prompt.source||"手动新增"),createdAt:String(prompt.createdAt||now()),updatedAt:String(prompt.updatedAt||now()),archived:Boolean(prompt.archived),access:["free","pro","pack"].includes(String(prompt.access||""))?String(prompt.access):"free",packId:String(prompt.packId||""),stripePriceId:String(prompt.stripePriceId||""),qualityScore:Number(prompt.qualityScore||60),exampleOutput:String(prompt.exampleOutput||""),sourceType:String(prompt.sourceType||"curated"),verifiedAt:String(prompt.verifiedAt||prompt.updatedAt||prompt.createdAt||""),seoKeywords:arr(prompt.seoKeywords)}}
function normalizeStore(raw){let prompts=Array.isArray(raw?.prompts)?raw.prompts.map(normalizePrompt):[];return{version:Number(raw?.version)||2,migratedAt:raw?.migratedAt||"",updatedAt:raw?.updatedAt||now(),prompts,assets:Array.isArray(raw?.assets)?raw.assets:[]}}
function clientIndexFromStore(){return{packs:indexData.packs||[],prompts:store.prompts.map(prompt=>({id:prompt.id,title:prompt.title,category:prompt.category,summary:prompt.summary,tags:prompt.tags,variablesCount:prompt.variables.length,access:prompt.access,packId:prompt.packId,qualityScore:prompt.qualityScore,sourceType:prompt.sourceType,verifiedAt:prompt.verifiedAt,seoKeywords:prompt.seoKeywords,tool:tagValue(prompt,"工具")||inferTool(prompt),modality:tagValue(prompt,"模态")||inferModality(prompt),use:tagValue(prompt,"用途")||prompt.category,difficulty:tagValue(prompt,"难度")||(prompt.variables.length>6?"进阶":"基础"),archived:prompt.archived,searchable:[prompt.title,prompt.category,prompt.summary,prompt.source,prompt.tags.join(" "),prompt.variables.join(" "),prompt.seoKeywords.join(" ")].join(" ").toLowerCase()}))}}
function tagValue(prompt,label){let prefixes=[`${label}:`,`${label}：`];return(prompt.tags||[]).find(tag=>prefixes.some(prefix=>String(tag).startsWith(prefix)))?.replace(new RegExp(`^${label}[:：]`),"").trim()||""}
function inferTool(prompt){let text=[prompt.title,prompt.category,prompt.summary,prompt.tags.join(" ")].join(" ");for(let tool of["Midjourney","Sora","Runway","Suno","ChatGPT","GPT Image","Cursor"])if(text.includes(tool))return tool;return"通用 AIGC"}
function inferModality(prompt){let text=[prompt.title,prompt.category,prompt.summary,prompt.tags.join(" ")].join(" ");for(let mod of["视频","图像","音频","多模态","代码","文本"])if(text.includes(mod))return mod;return"AIGC"}
function syncControls(){E.search.value=state.query;E.tool.value=state.tool;E.mod.value=state.modality;E.access.value=state.access;E.pack.value=state.pack;E.sort.value=state.sort}
function syncUrl(){let p=new URLSearchParams();if(state.query)p.set("q",state.query);if(state.tool!=="all")p.set("tool",state.tool);if(state.modality!=="all")p.set("mod",state.modality);if(state.access!=="all")p.set("access",state.access);if(state.pack!=="all")p.set("pack",state.pack);if(state.sort!=="relevance")p.set("sort",state.sort);history.replaceState(null,"",location.pathname+(p.toString()?`?${p}`:""))}
async function loadAll(){E.mode.textContent=IS_ADMIN?"管理员模式":"公开搜索";E.admin.hidden=!IS_ADMIN;try{await maybeConfirmCheckout();let [library,index,suggestion,access]=await Promise.all([fetchJson(API_LIBRARY),fetchJson(API_INDEX).catch(()=>null),fetchJson(API_SUGGESTIONS).catch(()=>({suggestions:[]})),fetchJson(API_ENTITLEMENT).catch(()=>({pro:false,packs:[]}))]);store=normalizeStore(library);indexData=index&&Array.isArray(index.prompts)?index:clientIndexFromStore();suggestions=suggestion||{suggestions:[]};entitlement=normalizeEntitlement(access);hydrateFilters();render()}catch(error){console.error(error);E.content.innerHTML=`<div class="empty"><strong>提示词库加载失败</strong>${esc(error.message||error)}</div>`}}
async function fetchJson(url,options){let res=await fetch(url,{cache:"no-store",headers:{Accept:"application/json"},...options});let data=await res.json().catch(()=>null);if(!res.ok)throw new Error(data?.error||`HTTP ${res.status}`);return data}
function normalizeEntitlement(value){return{pro:Boolean(value?.pro),packs:Array.isArray(value?.packs)?value.packs:[],customer:value?.customer||"",email:value?.email||""}}
async function maybeConfirmCheckout(){let sessionId=qs.get("session_id");if(qs.get("checkout")!=="success"||!sessionId)return;try{let data=await fetchJson(`${API_CONFIRM}?session_id=${encodeURIComponent(sessionId)}`);entitlement=normalizeEntitlement(data.entitlement);toast("支付状态已确认");history.replaceState(null,"",location.pathname)}catch(error){toast(`支付确认失败：${error.message||error}`)}}
function hydrateFilters(){let tools=[...new Set(indexData.prompts.map(x=>x.tool).filter(Boolean))].sort((a,b)=>a.localeCompare(b,"zh-CN"));let mods=[...new Set(indexData.prompts.map(x=>x.modality).filter(Boolean))].sort((a,b)=>a.localeCompare(b,"zh-CN"));E.tool.innerHTML=`<option value="all">全部工具</option>${tools.map(x=>`<option>${esc(x)}</option>`).join("")}`;E.mod.innerHTML=`<option value="all">全部模态</option>${mods.map(x=>`<option>${esc(x)}</option>`).join("")}`;E.pack.innerHTML=`<option value="all">全部精选包</option>${packs().map(pack=>`<option value="${esc(pack.id)}">${esc(pack.title)}</option>`).join("")}`;syncControls()}
function isUnlocked(entry){if(IS_ADMIN||entry.access==="free")return true;if(entitlement.pro)return true;if(entry.access==="pack"&&entitlement.packs.includes(entry.packId))return true;return false}
function searchResults(){let q=state.query.trim().toLowerCase();let tokens=q.split(/\s+/).filter(Boolean);let hasFilter=[state.tool,state.modality,state.access,state.pack].some(value=>value&&value!=="all");if(!q&&!hasFilter)return[];let results=[];for(let entry of indexData.prompts){if(entry.archived)continue;if(state.tool!=="all"&&entry.tool!==state.tool)continue;if(state.modality!=="all"&&entry.modality!==state.modality)continue;if(state.access!=="all"&&entry.access!==state.access)continue;if(state.pack!=="all"&&entry.packId!==state.pack)continue;let searchable=String(entry.searchable||"").toLowerCase();let score=Number(entry.qualityScore||0)/10;if(q){let hit=false;for(let token of tokens){if(String(entry.title||"").toLowerCase().includes(token)){score+=26;hit=true}else if(searchable.includes(token)){score+=10;hit=true}}if(!hit)continue}results.push({...entry,score})}if(state.sort==="quality")results.sort((a,b)=>Number(b.qualityScore||0)-Number(a.qualityScore||0));else if(state.sort==="newest")results.sort((a,b)=>Date.parse(b.verifiedAt||0)-Date.parse(a.verifiedAt||0));else results.sort((a,b)=>b.score-a.score||Number(b.qualityScore||0)-Number(a.qualityScore||0));return results}
function render(){syncControls();renderSummary();lastResults=searchResults();renderFilters();if(lastResults.length)renderResultGrid(lastResults);else renderLanding()}
function renderSummary(){let active=store.prompts.filter(prompt=>!prompt.archived);let counts=active.reduce((out,prompt)=>{out[prompt.access]=(out[prompt.access]||0)+1;return out},{});
E.summary.textContent=`${active.length} 条提示词 · 免费 ${counts.free||0} · Pro ${counts.pro||0} · 精选包 ${counts.pack||0}`;
E.metrics.innerHTML=[["总提示词",active.length],["免费",counts.free||0],["Pro",counts.pro||0],["精选包",counts.pack||0]].map(([k,v])=>`<div class="metric"><strong>${v}</strong><span>${k}</span></div>`).join("");
E.ent.innerHTML=`<span class="badge ${entitlement.pro?"pro":"free"}">${entitlement.pro?"Pro 已解锁":"未登录 Pro"}</span>${entitlement.packs.map(id=>`<span class="badge pack">${esc(packById(id)?.title||id)}</span>`).join("")}`;
E.dirty.textContent=dirty?"有未发布草稿":"无本地草稿";E.dirty.className=`badge ${dirty?"pack":"free"}`;
let keywords=["电商短视频开头","商品图一致性","Runway 分镜","Suno 品牌口播","多模态工作流","AI 视频角色一致性"];
E.hot.innerHTML=keywords.map(x=>`<button class="chip" data-query="${esc(x)}">${esc(x)}</button>`).join("");
E.saved.innerHTML=savedSearches().length?`<span class="badge">最近搜索</span>${savedSearches().map(x=>`<button class="chip" data-query="${esc(x)}">${esc(x)}</button>`).join("")}`:"";
}
function renderFilters(){let active=[];if(state.query)active.push(`关键词：${state.query}`);if(state.tool!=="all")active.push(`工具：${state.tool}`);if(state.modality!=="all")active.push(`模态：${state.modality}`);if(state.access!=="all")active.push(`访问：${state.access}`);if(state.pack!=="all")active.push(`包：${packById(state.pack)?.title||state.pack}`);E.filters.innerHTML=active.map(x=>`<span class="badge">${esc(x)}</span>`).join("")}
function renderLanding(){E.heading.textContent="先搜索，再浏览结果";E.sub.textContent=state.query?"没有匹配结果，试试热门关键词或放宽筛选。":"首页不铺满 1810 条内容，搜索后才展开可复制结果。";E.content.innerHTML=`<div class="landing"><section class="landing-section"><div class="landing-head"><div><h3>精选包入口</h3><p>用于商业化售卖的主题包，第一阶段通过 Stripe Checkout 解锁。</p></div></div><div class="grid">${packs().map(packCard).join("")}</div></section><section class="landing-section"><div class="landing-head"><div><h3>联网趋势建议</h3><p>只沉淀主题、关键词和结构灵感，不复制外站提示词原文。</p></div></div><div class="grid">${(suggestions.suggestions||[]).map(suggestionCard).join("")}</div></section></div>`}
function packCard(pack){return`<article class="pack-card"><div class="meta"><span class="badge pack">精选包</span><span class="badge">${Number(pack.promptCount||0)} 条</span></div><h4>${esc(pack.title)}</h4><p>${esc(pack.description)}</p><div class="meta"><span class="badge">${esc(pack.audience||"AIGC 创作者")}</span><span class="badge">${esc(pack.stripeEnv||"Stripe env 待配置")}</span></div><div class="card-actions"><button data-pack-search="${esc(pack.id)}">查看内容</button><button class="primary" data-buy-pack="${esc(pack.id)}">购买包</button></div></article>`}
function suggestionCard(item){return`<article class="suggestion-card"><div class="meta"><span class="badge">趋势</span><span class="badge">优先级 ${Number(item.priority||0)}</span></div><h4>${esc(item.keyword)}</h4><p>${esc(item.theme)}</p><div class="chips">${(item.suggestedFilters||[]).map(x=>`<span class="badge">${esc(x)}</span>`).join("")}</div>${IS_ADMIN?`<button data-draft-suggestion="${esc(item.id)}">生成草稿</button>`:""}</article>`}
function renderResultGrid(results){E.heading.textContent=`找到 ${results.length} 条匹配提示词`;E.sub.textContent="结果按相关性、质量评分和访问状态排序。锁定内容需要 Pro 或对应精选包。";E.content.innerHTML=`<div class="grid">${results.slice(0,72).map(promptCard).join("")}</div>${results.length>72?`<div class="empty"><strong>还有 ${results.length-72} 条结果</strong>请继续缩小关键词或筛选条件。</div>`:""}`}
function promptCard(entry){let prompt=promptById(entry.id)||entry,locked=!isUnlocked(entry),accessClass=entry.access==="free"?"free":entry.access==="pro"?"pro":"pack";return`<article class="prompt-card" data-open="${esc(entry.id)}"><div class="prompt-top"><div class="prompt-icon">${esc(String(entry.modality||"AI").slice(0,2))}</div><div><div class="meta"><span class="badge ${accessClass}">${esc(entry.access)}</span>${locked?'<span class="badge pro">锁定</span>':""}<span class="badge">评分 ${Number(entry.qualityScore||0)}</span></div><h3>${esc(entry.title)}</h3></div></div><p class="summary">${esc(entry.summary||prompt.summary||"暂无摘要")}</p><div class="meta"><span class="badge">${esc(entry.tool||"通用")}</span><span class="badge">${esc(entry.modality||"AIGC")}</span><span class="badge">${esc(entry.use||"创作")}</span><span class="badge">${esc(entry.difficulty||"基础")}</span><span class="badge">变量 ${Number(entry.variablesCount||prompt.variables?.length||0)}</span></div><div class="card-actions"><button data-copy="${esc(entry.id)}" ${locked?"disabled":""}>复制</button><button class="primary" data-open="${esc(entry.id)}">${locked?"解锁/详情":"查看详情"}</button></div></article>`}
function openDetail(id){let entry=indexById(id)||promptById(id),prompt=promptById(id)||entry;if(!entry||!prompt)return;activeDetailId=id;let locked=!isUnlocked(entry);E.detailTitle.textContent=prompt.title;let pack=packById(entry.packId);E.detailBody.innerHTML=`<div class="meta"><span class="badge ${entry.access==="free"?"free":entry.access==="pro"?"pro":"pack"}">${esc(entry.access)}</span><span class="badge">质量 ${Number(entry.qualityScore||prompt.qualityScore||0)}</span><span class="badge">${esc(entry.tool||"通用")}</span><span class="badge">${esc(entry.modality||"AIGC")}</span>${pack?`<span class="badge pack">${esc(pack.title)}</span>`:""}</div><p class="summary">${esc(prompt.summary||"")}</p><div class="chips">${(prompt.seoKeywords||entry.seoKeywords||[]).map(x=>`<span class="badge">${esc(x)}</span>`).join("")}</div><div class="field full">示例输出</div><p class="summary">${esc(prompt.exampleOutput||"暂无示例输出")}</p>${locked?lockedHtml(entry):`<div class="field full">提示词正文</div><pre>${esc(prompt.body||"")}</pre>`}${IS_ADMIN?`<div class="admin-row" style="margin-top:12px"><button data-edit="${esc(id)}">编辑</button></div>`:""}`;E.detailCopy.disabled=locked;E.detail.showModal()}
function lockedHtml(entry){let pack=packById(entry.packId);return`<div class="empty"><strong>${entry.access==="pro"?"Pro 会员内容":"精选包内容"}</strong>${pack?`属于「${esc(pack.title)}」。`:"开通后可复制完整正文。"}<div class="admin-row" style="justify-content:center;margin-top:12px"><button class="primary" data-buy-${entry.access==="pack"?"pack":"pro"}="${esc(entry.packId||"")}">${entry.access==="pack"?"购买精选包":"开通 Pro"}</button></div></div>`}
async function copyPrompt(id){let entry=indexById(id)||promptById(id),prompt=promptById(id);if(!entry||!prompt)return;if(!isUnlocked(entry))return openDetail(id);if(!prompt.body)return toast("当前提示词正文未解锁或不可用");try{await navigator.clipboard.writeText(prompt.body)}catch{let area=document.createElement("textarea");area.value=prompt.body;area.style.position="fixed";area.style.left="-9999px";document.body.appendChild(area);area.select();document.execCommand("copy");area.remove()}toast(`已复制：${prompt.title}`);let fav=favorites();fav.add(id);saveFavorites(fav)}
function openEditor(id){if(!IS_ADMIN)return;let p=id?promptById(id):null;let f=E.editorForm.elements;E.editorTitle.textContent=p?"编辑提示词":"新增提示词";E.editorForm.reset();f.id.value=p?.id||"";f.title.value=p?.title||"";f.category.value=p?.category||"";f.status.value=p?.status||"待验证";f.source.value=p?.source||"手动新增";f.access.value=p?.access||"free";f.packId.value=p?.packId||"";f.stripePriceId.value=p?.stripePriceId||"";f.qualityScore.value=p?.qualityScore||70;f.sourceType.value=p?.sourceType||"curated";f.verifiedAt.value=p?.verifiedAt||now().slice(0,10);f.tags.value=(p?.tags||[]).join(", ");f.variables.value=(p?.variables||[]).join(", ");f.seoKeywords.value=(p?.seoKeywords||[]).join(", ");f.exampleOutput.value=p?.exampleOutput||"";f.summary.value=p?.summary||"";f.body.value=p?.body||"";E.editor.showModal()}
function saveEditor(event){event.preventDefault();if(!IS_ADMIN)return;let f=E.editorForm.elements,id=f.id.value.trim(),time=now(),old=promptById(id);let prompt=normalizePrompt({id:id||`prompt-${Date.now().toString(36)}`,title:f.title.value.trim(),category:f.category.value.trim(),status:f.status.value.trim(),source:f.source.value.trim(),access:f.access.value,packId:f.packId.value.trim(),stripePriceId:f.stripePriceId.value.trim(),qualityScore:Number(f.qualityScore.value||70),sourceType:f.sourceType.value.trim(),verifiedAt:f.verifiedAt.value.trim(),tags:arr(f.tags.value),variables:arr(f.variables.value),seoKeywords:arr(f.seoKeywords.value),exampleOutput:f.exampleOutput.value.trim(),summary:f.summary.value.trim(),body:f.body.value.trim(),createdAt:old?.createdAt||time,updatedAt:time,archived:old?.archived||false});let index=store.prompts.findIndex(x=>x.id===prompt.id);if(index>=0)store.prompts[index]=prompt;else store.prompts.unshift(prompt);indexData=clientIndexFromStore();dirty=true;E.editor.close();render();toast("已保存到管理员草稿")}
function publicLibrary(){return{version:store.version||2,migratedAt:store.migratedAt||"",updatedAt:now(),prompts:store.prompts,assets:store.assets||[]}}
async function publishLibrary(){if(!IS_ADMIN||!dirty)return toast("没有需要发布的草稿");try{let data=await fetchJson(API_LIBRARY,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({library:publicLibrary(),message:"Update prompt commerce library"})});dirty=false;render();toast(data.commit?"已提交到 GitHub，等待部署":"已发布")}catch(error){toast(`发布失败：${error.message||error}`)}}
function renderSuggestionReview(){E.suggestionBody.innerHTML=`<div class="grid">${(suggestions.suggestions||[]).map(suggestionCard).join("")}</div>`;E.suggestions.showModal()}
function draftFromSuggestion(id){let item=(suggestions.suggestions||[]).find(x=>x.id===id);if(!item)return;openEditor();let f=E.editorForm.elements;f.title.value=`${item.keyword}提示词模板`;f.category.value="AIGC 趋势草稿";f.status.value="待验证";f.source.value="联网建议审核池";f.access.value="pro";f.qualityScore.value=72;f.sourceType.value="web-inspired-draft";f.verifiedAt.value=now().slice(0,10);f.tags.value=arr(item.suggestedFilters).join(", ");f.seoKeywords.value=[item.keyword,...arr(item.suggestedFilters)].join(", ");f.summary.value=item.theme;f.exampleOutput.value=`输出一份围绕「${item.keyword}」的自写 AIGC 提示词结构。`;f.body.value=`目标：围绕「${item.keyword}」生成可复用提示词。\n\n背景：${item.theme}\n\n输入变量：\n- {项目目标}\n- {目标平台}\n- {受众}\n- {风格方向}\n- {交付格式}\n\n复制即用提示词：\n请基于 {项目目标}，为 {目标平台} 的 {受众} 设计一份 AIGC 生成提示词。要求：结构清晰、变量可替换、明确风格方向为 {风格方向}，输出格式为 {交付格式}。避免复制任何外站提示词原文，只使用主题、关键词和结构灵感。\n\n质量标准：\n1. 明确任务目标。\n2. 明确输入变量。\n3. 明确输出格式。\n4. 包含失败修正建议。\n5. 包含边界提醒。\n\n边界提醒：不要使用外站 prompt 原文，不生成侵权、欺诈、仿冒或规避审核内容。`}
async function startCheckout(productType,packId=""){try{let data=await fetchJson(API_CHECKOUT,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({productType,packId})});if(data.checkoutUrl)location.assign(data.checkoutUrl);else toast("Stripe Checkout 未返回跳转地址")}catch(error){toast(`支付未配置：${error.message||error}`)}}
async function openPortal(){try{let data=await fetchJson(API_PORTAL,{method:"POST",headers:{"Content-Type":"application/json"},body:"{}"});if(data.url)location.assign(data.url)}catch(error){toast(`订阅管理未配置：${error.message||error}`)}}
document.addEventListener("click",event=>{let target=event.target.closest("button,a,article");if(!target)return;if(target.dataset.query){state.query=target.dataset.query;saveSearch(state.query);syncUrl();render();return}if(target.dataset.packSearch){state.pack=target.dataset.packSearch;state.access="pack";syncUrl();render();return}if(target.dataset.buyPack!==undefined){startCheckout("pack",target.dataset.buyPack);return}if(target.dataset.buyPro!==undefined||target.id==="buyPro"){startCheckout("pro");return}if(target.dataset.open){openDetail(target.dataset.open);return}if(target.dataset.copy){event.stopPropagation();copyPrompt(target.dataset.copy);return}if(target.dataset.edit){openEditor(target.dataset.edit);return}if(target.dataset.draftSuggestion){draftFromSuggestion(target.dataset.draftSuggestion);return}if(target.dataset.close){$(target.dataset.close).close();return}});
$("runSearch").onclick=()=>{state.query=E.search.value.trim();saveSearch(state.query);syncUrl();render()};
$("clearSearch").onclick=()=>{state.query="";E.search.value="";syncUrl();render();E.search.focus()};
E.search.onkeydown=event=>{if(event.key==="Enter")$("runSearch").click()};
E.search.oninput=()=>{state.query=E.search.value.trim();syncUrl();render()};
[E.tool,E.mod,E.access,E.pack,E.sort].forEach(control=>control.onchange=()=>{state.tool=E.tool.value;state.modality=E.mod.value;state.access=E.access.value;state.pack=E.pack.value;state.sort=E.sort.value;syncUrl();render()});
$("newPrompt").onclick=()=>openEditor();
$("publishLibrary").onclick=publishLibrary;
$("openSuggestionReview").onclick=renderSuggestionReview;
$("managePortal").onclick=openPortal;
E.editorForm.onsubmit=saveEditor;
E.detailCopy.onclick=()=>copyPrompt(activeDetailId);
loadAll();
  </script>
