<html lang="zh-CN">

  <title>提示词网页仓库</title>
  <style>
    :root{--bg:#f5f6f3;--p:#fff;--soft:#eef4f1;--t:#202421;--m:#657067;--b:#d8dfda;--a:#0f766e;--ad:#0b5f59;--w:#b45309;--d:#b91c1c;--s:0 10px 26px rgba(22,31,27,.08);--r:8px}

    aside,.card,.panel{border:1px solid var(--b);border-radius:var(--r);background:var(--p);box-shadow:var(--s);overflow:hidden}

    input,textarea,select{width:100%;border:1px solid var(--b);border-radius:var(--r);background:#fff;color:var(--t);padding:9px 10px;font:14px inherit;outline:none}textarea{min-height:120px;resize:vertical;line-height:1.6}input:focus,textarea:focus,select:focus{border-color:var(--a);box-shadow:0 0 0 3px rgba(15,118,110,.14)}
    .cat{width:100%;display:flex;justify-content:space-between;gap:8px;text-align:left;border-color:transparent;background:transparent}.cat.active{background:rgba(15,118,110,.1);color:var(--a);border-color:rgba(15,118,110,.28)}

    .head{display:flex;justify-content:space-between;gap:12px;align-items:center;margin-bottom:12px}.head h2{margin:0;font-size:18px}.grid{display:grid;gap:12px}.card-main{padding:16px}.card-top{display:flex;justify-content:space-between;gap:16px;align-items:flex-start}.title{margin:0 0 8px;font-size:18px;line-height:1.35}
    .meta,.chips{display:flex;gap:8px;flex-wrap:wrap;align-items:center}.meta{margin:0 0 10px;color:var(--m);font-size:12px}.badge{display:inline-flex;align-items:center;min-height:24px;border:1px solid var(--b);border-radius:999px;padding:2px 8px;background:#f7f8f6;color:var(--m);font-size:12px}.badge.catb{border-color:rgba(15,118,110,.24);color:var(--a);background:rgba(15,118,110,.08)}.badge.st{border-color:rgba(180,83,9,.25);color:#7c4a03;background:#fffbeb}.badge.dirty{border-color:rgba(180,83,9,.32);color:#7c2d12;background:#fff7ed}
    .summary{margin:0 0 12px;color:#353936;font-size:14px}.label{margin:12px 0 6px;color:var(--m);font-size:12px;font-weight:700}details{border-top:1px solid var(--b);background:#fbfcfb}summary{padding:12px 16px;cursor:pointer;color:var(--a);font-weight:700;font-size:13px}pre{margin:0;padding:0 16px 16px;max-height:68vh;overflow:auto;white-space:pre-wrap;word-break:break-word;font:13px/1.72 "Microsoft YaHei",Arial,sans-serif}.empty{padding:30px;border:1px dashed var(--b);border-radius:var(--r);background:#fff;color:var(--m);text-align:center}
    .importer{border:1px dashed rgba(15,118,110,.45);border-radius:var(--r);background:#f8fbfa;padding:16px;margin-bottom:12px;display:grid;gap:10px}.importer.drag{background:#e8f4f2;border-color:var(--a)}.import-title{font-weight:800}.import-row{display:flex;gap:8px;flex-wrap:wrap;align-items:center}.import-note{color:var(--m);font-size:13px}.import-result{font-size:13px;color:#25534e}
    .asset-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:12px}.asset-card{display:grid;grid-template-rows:190px auto}.preview{background:#eef0ee;border-bottom:1px solid var(--b);display:flex;align-items:center;justify-content:center;overflow:hidden;color:var(--m);font-size:13px;text-align:center;padding:12px;cursor:pointer}.preview img{width:100%;height:100%;object-fit:cover}.muted{color:var(--m)}
    .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}.full{grid-column:1/-1}label{display:grid;gap:6px;color:var(--m);font-size:12px;font-weight:700}
    dialog{width:min(900px,calc(100vw - 28px));max-height:calc(100vh - 28px);border:1px solid var(--b);border-radius:var(--r);padding:0;box-shadow:0 24px 80px rgba(22,31,27,.24)}dialog::backdrop{background:rgba(20,25,22,.42)}.dh,.df{display:flex;justify-content:space-between;gap:12px;align-items:center;padding:14px 16px;border-bottom:1px solid var(--b);background:var(--soft)}.dh h3{margin:0}.db{padding:16px;max-height:calc(100vh - 160px);overflow:auto}.df{justify-content:flex-end;border-top:1px solid var(--b);border-bottom:0;background:#fff}
    .viewer{width:min(1100px,calc(100vw - 28px))}.viewer .db{padding:0;background:#111;text-align:center}.viewer img{max-width:100%;max-height:calc(100vh - 140px);display:block;margin:auto}
    .stats{display:grid;grid-template-columns:repeat(4,minmax(120px,1fr));gap:10px}.stat{border:1px solid var(--b);border-radius:var(--r);background:#fbfcfb;padding:12px}.stat strong{display:block;font-size:22px;line-height:1.2}.stat span{color:var(--m);font-size:12px}.panel{padding:16px;display:grid;gap:14px}.toast{position:fixed;right:20px;bottom:20px;z-index:40;max-width:min(520px,calc(100vw - 40px));padding:12px 14px;border-radius:var(--r);background:#202421;color:#fff;box-shadow:var(--s);opacity:0;transform:translateY(12px);pointer-events:none;transition:.18s;font-size:13px}.toast.show{opacity:1;transform:translateY(0)}
    @media(max-width:980px){.top{grid-template-columns:1fr;padding:16px}.tabs{justify-content:flex-start}main{grid-template-columns:1fr;padding:16px}aside{position:static}.head,.card-top{align-items:flex-start;flex-direction:column}.actions,.card-top button{width:100%}.actions button{flex:1}.form-grid{grid-template-columns:1fr}.stats{grid-template-columns:repeat(2,minmax(120px,1fr))}}
  </style>
</head>
<body>
  <header><div class="top"><div><h1>提示词网页仓库 <span class="mode badge" id="modeBadge"></span></h1><p class="sub" id="sub">正在读取共享提示词库...</p></div><nav class="tabs"><button class="tab active" data-view="prompts">提示词库</button><button class="tab" data-view="assets">图片素材</button><button class="tab" data-view="archive">归档</button><button class="tab" data-view="backup">个人备份</button></nav></div></header>
  <main><aside><div class="ah"><span id="asideTitle">筛选</span><span class="pill" id="visibleCount">0</span></div><div class="filters"><input id="search" type="search" placeholder="搜索标题、分类、标签、变量或正文"><button id="clearSearch">清空搜索</button><div id="categoryList"></div></div><div class="notice" id="notice">共享数据由 GitHub 仓库提供。普通访问者只能查看、搜索和复制。</div></aside><section><div class="head"><h2 id="resultTitle">全部提示词</h2><div class="actions" id="contentActions"></div></div><div id="content"><div class="empty">正在加载共享库...</div></div></section></main>
  <dialog id="promptDialog"><form method="dialog" id="promptForm"><div class="dh"><h3 id="promptDialogTitle">新增提示词</h3><button type="button" data-close="promptDialog">关闭</button></div><div class="db"><input type="hidden" name="id"><div class="form-grid"><label>标题<input name="title" required></label><label>分类<input name="category" required></label><label>状态<input name="status" placeholder="推荐 / 待优化 / 待验证"></label><label>来源<input name="source" placeholder="手动新增"></label><label class="full">标签（逗号分隔）<input name="tags"></label><label class="full">变量（逗号分隔）<input name="variables"></label><label class="full">摘要<textarea name="summary" rows="3"></textarea></label><label class="full">提示词正文<textarea name="body" required rows="14"></textarea></label></div></div><div class="df"><button type="button" data-close="promptDialog">取消</button><button class="primary" type="submit">保存到草稿</button></div></form></dialog>
  <dialog id="assetDialog"><form method="dialog" id="assetForm"><div class="dh"><h3 id="assetDialogTitle">编辑图片素材</h3><button type="button" data-close="assetDialog">关闭</button></div><div class="db"><input type="hidden" name="id"><div class="form-grid"><label>标题<input name="title" required></label><label>分类<input name="category" required></label><label class="full">标签（逗号分隔）<input name="tags"></label><label class="full">用途说明<textarea name="notes" rows="5"></textarea></label><label class="full">关联提示词<select name="relatedPromptIds" multiple size="7" id="relatedPromptSelect"></select></label></div></div><div class="df"><button type="button" data-close="assetDialog">取消</button><button class="primary" type="submit">保存到草稿</button></div></form></dialog>
  <dialog id="viewerDialog" class="viewer"><div class="dh"><h3 id="viewerTitle">查看原图</h3><button type="button" data-close="viewerDialog">关闭</button></div><div class="db"><img id="viewerImage" alt=""></div></dialog>
  <div class="toast" id="toast"></div>
  <script>
const API_LIBRARY='/api/prompts/library',API_ASSETS='/api/prompts/assets';
const TYPES=['image/jpeg','image/png','image/webp','image/gif','image/svg+xml'],EXT=/\.(jpe?g|png|webp|gif|svg)$/i;
const IS_ADMIN=location.pathname.replace(/\/+$/,'').startsWith('/prompts/admin');
const SECRET_WORDS=['sk-'+'proj-','github'+'_pat_','gh'+'p_'];
let state={view:'prompts',category:'全部',query:''},store=norm({prompts:[],assets:[]}),loading=true,draftDirty=false,publishing=false,currentViewerUrl=null;
const localPreviewUrls=new Map();
const $=id=>document.getElementById(id),E={mode:$('modeBadge'),notice:$('notice'),sub:$('sub'),tabs:document.querySelectorAll('.tab'),aside:$('asideTitle'),vc:$('visibleCount'),search:$('search'),cat:$('categoryList'),title:$('resultTitle'),actions:$('contentActions'),content:$('content'),toast:$('toast'),pd:$('promptDialog'),pf:$('promptForm'),pt:$('promptDialogTitle'),ad:$('assetDialog'),af:$('assetForm'),at:$('assetDialogTitle'),rs:$('relatedPromptSelect'),vd:$('viewerDialog'),vi:$('viewerImage'),vt:$('viewerTitle')};
function now(){let d=new Date(),p=n=>String(n).padStart(2,'0');return `${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())} ${p(d.getHours())}:${p(d.getMinutes())}:${p(d.getSeconds())}`}
function uid(p){return `${p}-${Date.now().toString(36)}-${Math.random().toString(36).slice(2,8)}`}
function esc(v){return String(v??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#039;')}
function arr(v){return Array.isArray(v)?v:String(v||'').split(/[,，\n]/).map(x=>x.trim()).filter(Boolean)}
function safeSrc(v){let s=String(v||'').trim();return s.startsWith('/prompts-data/assets/')?s:''}
function norm(raw){let n=now(),prompts=arr(raw?.prompts).map(p=>({id:String(p.id||uid('prompt')),title:String(p.title||'未命名提示词'),category:String(p.category||'未分类'),tags:arr(p.tags),variables:arr(p.variables),status:String(p.status||'待验证'),summary:String(p.summary||''),body:String(p.body||''),source:String(p.source||'手动新增'),createdAt:String(p.createdAt||n),updatedAt:String(p.updatedAt||n),archived:!!p.archived}));let ids=new Set(prompts.map(p=>p.id));return{version:2,migratedAt:raw?.migratedAt||n,updatedAt:raw?.updatedAt||n,prompts,assets:arr(raw?.assets).map(a=>({id:String(a.id||uid('asset')),title:String(a.title||'未命名素材'),category:String(a.category||'未分类'),tags:arr(a.tags),src:safeSrc(a.src),notes:String(a.notes||''),relatedPromptIds:arr(a.relatedPromptIds).filter(id=>ids.has(id)),createdAt:String(a.createdAt||n),updatedAt:String(a.updatedAt||n),blobId:String(a.blobId||''),thumbBlobId:String(a.thumbBlobId||''),hash:String(a.hash||''),relativePath:String(a.relativePath||String(a.src||'').replace(/^\/+/,'')).replace(/^\/+/,''),fileName:String(a.fileName||a.title||''),size:Number(a.size||0),mime:String(a.mime||''),width:Number(a.width||0),height:Number(a.height||0),importedAt:String(a.importedAt||a.createdAt||n)}))}}
function publicLibrary(){let x=norm(store);x.assets=x.assets.map(({blobId,thumbBlobId,...a})=>a);return x}
function active(){return store.prompts.filter(p=>!p.archived)}
function arch(){return store.prompts.filter(p=>p.archived)}
function base(){return state.view==='assets'?store.assets:state.view==='archive'?arch():active()}
function rel(a){return(a.relatedPromptIds||[]).map(id=>store.prompts.find(p=>p.id===id)?.title).filter(Boolean)}
function text(x){return state.view==='assets'?[x.title,x.category,x.src,x.notes,x.tags.join(' '),x.relativePath,x.fileName,rel(x).join(' ')].join(' ').toLowerCase():[x.title,x.category,x.source,x.status,x.summary,x.tags.join(' '),x.variables.join(' '),x.body].join(' ').toLowerCase()}
function filt(){let q=state.query.trim().toLowerCase();return base().filter(x=>(state.category==='全部'||x.category===state.category)&&(!q||text(x).includes(q)))}
function cats(){let c={'全部':base().length};base().forEach(x=>c[x.category]=(c[x.category]||0)+1);return['全部',...Object.keys(c).filter(x=>x!=='全部').sort((a,b)=>a.localeCompare(b,'zh-Hans-CN'))].map(k=>[k,c[k]])}
async function loadLibrary(){loading=true;render();try{let res=await fetch(API_LIBRARY,{headers:{Accept:'application/json'},cache:'no-store'});if(!res.ok)throw new Error(`HTTP ${res.status}`);store=norm(await res.json());draftDirty=false;loading=false;render();toast('共享库已加载')}catch(e){loading=false;E.content.innerHTML=`<div class="empty">共享库加载失败：${esc(e.message||e)}</div>`;E.sub.textContent='共享库加载失败';toast('共享库加载失败')}}
function markDirty(msg){draftDirty=true;store.updatedAt=now();render();if(msg)toast(msg)}
function render(){E.mode.textContent=IS_ADMIN?(draftDirty?'管理员草稿未发布':'管理员模式'):'只读模式';E.mode.classList.toggle('dirty',IS_ADMIN&&draftDirty);E.notice.classList.toggle('warn',IS_ADMIN&&draftDirty);E.notice.textContent=IS_ADMIN?'管理员改动只保存在当前草稿里，点击“发布到 GitHub”后才会成为公共内容。':'共享数据由 GitHub 仓库提供。普通访问者只能查看、搜索和复制。';E.tabs.forEach(t=>t.classList.toggle('active',t.dataset.view===state.view));E.sub.textContent=loading?'正在读取共享提示词库...':`提示词 ${active().length} 条 · 归档 ${arch().length} 条 · 图片素材 ${store.assets.length} 条 · 共享库更新 ${store.updatedAt}`;renderCats();renderActions();if(loading){E.content.innerHTML='<div class="empty">正在加载共享库...</div>';return}state.view==='assets'?renderAssets():state.view==='backup'?renderBackup():renderPrompts()}
function renderCats(){E.aside.textContent=state.view==='assets'?'素材分类':state.view==='archive'?'归档分类':state.view==='backup'?'数据状态':'提示词分类';if(state.view==='backup'){E.cat.innerHTML=`<div class="stat"><strong>${active().length}</strong><span>当前提示词</span></div><div class="stat"><strong>${arch().length}</strong><span>归档提示词</span></div><div class="stat"><strong>${store.assets.length}</strong><span>图片素材</span></div>`;E.vc.textContent=store.prompts.length+store.assets.length;return}let cs=cats();if(!cs.some(x=>x[0]===state.category))state.category='全部';E.cat.innerHTML=cs.map(([k,n])=>`<button class="cat ${k===state.category?'active':''}" data-cat="${esc(k)}"><span>${esc(k)}</span><span class="pill">${n}</span></button>`).join('');E.cat.querySelectorAll('button').forEach(b=>b.onclick=()=>{state.category=b.dataset.cat;render()});E.vc.textContent=filt().length}
function renderActions(){let a=[];if(IS_ADMIN){a.push(`<button id="reloadLibrary">重新加载共享库</button>`,`<button class="primary" id="publishLibrary" ${publishing||!draftDirty?'disabled':''}>${publishing?'发布中...':'发布到 GitHub'}</button>`)}if(state.view==='prompts'){E.title.textContent=`提示词库 · ${filt().length} 条`;if(IS_ADMIN)a.unshift('<button class="primary" id="addP">新增提示词</button>');a.push('<button id="ex">全部展开</button>','<button id="co">全部折叠</button>')}else if(state.view==='assets'){E.title.textContent=`图片素材 · ${filt().length} 条`;if(IS_ADMIN)a.unshift('<button class="primary" id="pickFiles">选择图片</button>','<button id="pickFolder">选择文件夹</button>','<input hidden id="fileInput" type="file" accept="image/*" multiple>','<input hidden id="folderInput" type="file" webkitdirectory multiple>')}else E.title.textContent=state.view==='archive'?`归档 · ${filt().length} 条`:'个人备份';E.actions.innerHTML=a.join('');if(IS_ADMIN){let r=$('reloadLibrary'),p=$('publishLibrary');if(r)r.onclick=()=>{if(!draftDirty||confirm('重新加载会放弃当前未发布草稿。确认继续？'))loadLibrary()};if(p)p.onclick=publishLibrary;let add=$('addP');if(add)add.onclick=()=>openPrompt();let fi=$('fileInput'),fo=$('folderInput');if(fi)fi.onchange=e=>importFileList([...e.target.files].map(f=>({file:f,path:f.name})));if(fo)fo.onchange=e=>importFileList([...e.target.files].map(f=>({file:f,path:f.webkitRelativePath||f.name})))}let ex=$('ex'),co=$('co');if(ex)ex.onclick=()=>document.querySelectorAll('details').forEach(d=>d.open=1);if(co)co.onclick=()=>document.querySelectorAll('details').forEach(d=>d.open=0)}
function renderPrompts(){let xs=filt();if(!xs.length){E.content.innerHTML='<div class="empty">没有匹配的提示词。</div>';return}E.content.innerHTML='<div class="grid">'+xs.map(pcard).join('')+'</div>';E.content.querySelectorAll('[data-copy]').forEach(b=>b.onclick=()=>copyPrompt(b.dataset.copy));if(IS_ADMIN){E.content.querySelectorAll('[data-edit]').forEach(b=>b.onclick=()=>openPrompt(b.dataset.edit));E.content.querySelectorAll('[data-archive]').forEach(b=>b.onclick=()=>archivePrompt(b.dataset.archive));E.content.querySelectorAll('[data-restore]').forEach(b=>b.onclick=()=>restorePrompt(b.dataset.restore));E.content.querySelectorAll('[data-del]').forEach(b=>b.onclick=()=>deletePrompt(b.dataset.del))}}
function pcard(p){let ctl='';if(IS_ADMIN)ctl=p.archived?`<button data-restore="${esc(p.id)}">恢复</button><button class="danger" data-del="${esc(p.id)}">永久删除</button>`:`<button data-edit="${esc(p.id)}">编辑</button><button class="warn" data-archive="${esc(p.id)}">归档</button>`;return`<article class="card"><div class="card-main"><div class="card-top"><div><h3 class="title">${esc(p.title)}</h3><div class="meta"><span class="badge catb">${esc(p.category)}</span><span class="badge st">${esc(p.status)}</span><span>来源：${esc(p.source)}</span><span>更新：${esc(p.updatedAt)}</span></div></div><div class="actions"><button class="primary" data-copy="${esc(p.id)}">复制</button>${ctl}</div></div><p class="summary">${esc(p.summary)}</p><div class="label">标签</div><div class="chips">${p.tags.map(x=>`<span class="badge">${esc(x)}</span>`).join('')||'<span class="badge">无标签</span>'}</div><div class="label">变量</div><div class="chips">${p.variables.map(x=>`<span class="badge">${esc(x)}</span>`).join('')||'<span class="badge">无变量</span>'}</div></div><details><summary>展开完整提示词正文</summary><pre>${esc(p.body)}</pre></details></article>`}
function renderAssets(){let xs=filt();E.content.innerHTML=(IS_ADMIN?importer():'')+(!xs.length?`<div class="empty">${IS_ADMIN?'没有匹配的图片素材。可以把图片或文件夹拖到上方上传。':'没有匹配的图片素材。'}</div>`:'<div class="asset-grid">'+xs.map(acard).join('')+'</div>');if(IS_ADMIN){bindImporter();E.content.querySelectorAll('[data-edita]').forEach(b=>b.onclick=()=>openAsset(b.dataset.edita));E.content.querySelectorAll('[data-dela]').forEach(b=>b.onclick=()=>deleteAsset(b.dataset.dela))}E.content.querySelectorAll('[data-src]').forEach(b=>b.onclick=()=>copyText(asset(b.dataset.src)?.relativePath||asset(b.dataset.src)?.src||'','已复制图片路径'));E.content.querySelectorAll('[data-viewimg]').forEach(b=>b.onclick=()=>viewImage(b.dataset.viewimg))}
function importer(){return`<div class="importer" id="dropZone"><div class="import-title">上传图片到 GitHub 仓库</div><div class="import-note">支持 jpg / png / webp / gif / svg。图片文件会先写入 GitHub；索引改动仍需点击“发布到 GitHub”后才对所有人可见。</div><div class="import-row"><button class="primary" id="zonePickFolder">选择文件夹</button><button id="zonePickFiles">选择图片</button><span class="badge">上传后请发布索引</span></div><div class="import-result" id="importResult"></div></div>`}
function acard(a){let dim=a.width&&a.height?`${a.width} × ${a.height}`:'尺寸未知',size=a.size?fmt(a.size):'大小未知',preview=assetPreviewSrc(a),admin=IS_ADMIN?`<button data-edita="${esc(a.id)}">编辑</button><button class="danger" data-dela="${esc(a.id)}">删除索引</button>`:'';return`<article class="card asset-card"><div class="preview" data-viewimg="${esc(a.id)}">${preview?`<img src="${esc(preview)}" alt="${esc(a.title)}" onerror="this.replaceWith(document.createTextNode('图片等待部署或不可访问'))">`:'图片未找到'}</div><div class="card-main"><h3 class="title">${esc(a.title)}</h3><div class="meta"><span class="badge catb">${esc(a.category)}</span><span>${esc(dim)}</span><span>${esc(size)}</span></div><p class="summary">${esc(a.notes||'无说明')}</p><div class="label">路径</div><div class="chips"><span class="badge">${esc(a.relativePath||a.src||a.fileName)}</span></div><div class="label">标签</div><div class="chips">${a.tags.map(x=>`<span class="badge">${esc(x)}</span>`).join('')||'<span class="badge">无标签</span>'}</div><div class="label">关联提示词</div><div class="chips">${rel(a).map(x=>`<span class="badge">${esc(x)}</span>`).join('')||'<span class="badge">未关联</span>'}</div><div class="actions" style="margin-top:12px"><button data-src="${esc(a.id)}">复制路径</button>${admin}</div></div></article>`}
function bindImporter(){let z=$('dropZone');if(!z)return;$('zonePickFiles').onclick=()=>$('fileInput')?.click();$('zonePickFolder').onclick=()=>$('folderInput')?.click();['dragenter','dragover'].forEach(ev=>z.addEventListener(ev,e=>{e.preventDefault();z.classList.add('drag')}));['dragleave','drop'].forEach(ev=>z.addEventListener(ev,e=>{e.preventDefault();z.classList.remove('drag')}));z.addEventListener('drop',async e=>{let items=await getDropItems(e.dataTransfer);importFileList(items)})}
async function getDropItems(dt){let out=[];if(dt.items&&dt.items.length){for(let item of dt.items){let entry=item.webkitGetAsEntry?.();if(entry)await walkEntry(entry,'',out);else{let f=item.getAsFile?.();if(f)out.push({file:f,path:f.name})}}}else out=[...dt.files].map(f=>({file:f,path:f.webkitRelativePath||f.name}));return out}
function walkEntry(entry,path,out){return new Promise(resolve=>{if(entry.isFile){entry.file(f=>{out.push({file:f,path:path+f.name});resolve()})}else if(entry.isDirectory){let reader=entry.createReader(),dir=path+entry.name+'/';let read=()=>reader.readEntries(async entries=>{if(!entries.length){resolve();return}for(let e of entries)await walkEntry(e,dir,out);read()});read()}else resolve()})}
async function importFileList(items){if(!IS_ADMIN)return;let stat={ok:0,dup:0,skip:0,fail:0};setImportResult('正在上传图片到 GitHub...');for(let it of items){try{let f=it.file,path=it.path||f.webkitRelativePath||f.name;if(!isImage(f,path)){stat.skip++;continue}let hash=await hashFile(f);if(store.assets.some(a=>a.hash===hash)){stat.dup++;continue}let meta=await imageMeta(f),uploaded=await uploadAssetBlob(f,{title:titleFrom(path),category:catFrom(path),width:meta.width,height:meta.height});store.assets.unshift(uploaded);localPreviewUrls.set(uploaded.id,URL.createObjectURL(f));stat.ok++}catch(e){console.error(e);stat.fail++}}markDirty(`图片上传完成：成功 ${stat.ok}，重复 ${stat.dup}，失败 ${stat.fail}`);setImportResult(`上传完成：成功 ${stat.ok}，跳过重复 ${stat.dup}，跳过非图片 ${stat.skip}，失败 ${stat.fail}`)}
async function uploadAssetBlob(blob,meta={}){let form=new FormData(),name=meta.fileName||blob.name||'asset';form.append('file',blob,name);form.append('title',meta.title||titleFrom(name));form.append('category',meta.category||'待分类');form.append('notes',meta.notes||'');form.append('width',String(meta.width||0));form.append('height',String(meta.height||0));let res=await fetch(API_ASSETS,{method:'POST',body:form});let data=await res.json().catch(()=>({}));if(!res.ok||!data.asset)throw new Error(data.error||`上传失败 HTTP ${res.status}`);return norm({prompts:store.prompts,assets:[data.asset]}).assets[0]}
function setImportResult(t){let el=$('importResult');if(el)el.textContent=t}
function isImage(f,p){return TYPES.includes(f.type)||EXT.test(p)}
async function hashFile(f){let buf=await f.arrayBuffer(),dig=await crypto.subtle.digest('SHA-256',buf);return[...new Uint8Array(dig)].map(b=>b.toString(16).padStart(2,'0')).join('')}
function catFrom(p){let parts=p.replace(/\\/g,'/').split('/').filter(Boolean);parts.pop();return parts.length?parts.join(' / '):'待分类'}
function titleFrom(p){let n=p.replace(/\\/g,'/').split('/').pop()||'未命名图片';return n.replace(/\.[^.]+$/,'')}
function fmt(n){if(n<1024)return n+' B';if(n<1048576)return(n/1024).toFixed(1)+' KB';return(n/1048576).toFixed(1)+' MB'}
function imageMeta(file){return new Promise(res=>{let u=URL.createObjectURL(file),img=new Image();img.onload=()=>{let w=img.naturalWidth,h=img.naturalHeight;URL.revokeObjectURL(u);res({width:w,height:h})};img.onerror=()=>{URL.revokeObjectURL(u);res({width:0,height:0})};img.src=u})}
function assetPreviewSrc(a){return localPreviewUrls.get(a.id)||a.src||''}
async function viewImage(id){let a=asset(id);if(!a)return;let src=assetPreviewSrc(a);if(!src){toast('原图未找到');return}E.vi.src=src;E.vt.textContent=a.title;E.vd.showModal()}
function renderBackup(){let adminImport=IS_ADMIN?`<div><div class="label">导入为管理员草稿</div><div class="actions" style="justify-content:flex-start"><input id="importJson" type="file" accept="application/json,.json" style="max-width:360px"><button id="importSelected">导入并生成草稿</button><span class="badge">导入后仍需发布</span></div></div>`:`<div class="notice">普通访问者不能导入或改写公共库。这里导出的文件只是个人备份。</div>`;E.content.innerHTML=`<div class="panel"><div class="stats"><div class="stat"><strong>${active().length}</strong><span>当前提示词</span></div><div class="stat"><strong>${arch().length}</strong><span>归档提示词</span></div><div class="stat"><strong>${store.prompts.length}</strong><span>提示词总数</span></div><div class="stat"><strong>${store.assets.length}</strong><span>图片素材</span></div></div><div><div class="label">导出个人备份</div><div class="actions" style="justify-content:flex-start"><button class="primary" id="exportLite">导出轻量备份</button><button id="exportFull">导出完整备份（含图片）</button><span class="badge">不是公共内容源</span></div></div>${adminImport}</div>`;$('exportLite').onclick=()=>exportJson(false);$('exportFull').onclick=()=>exportJson(true);let im=$('importSelected');if(im)im.onclick=importJson}
function prompt(id){return store.prompts.find(p=>p.id===id)}
function asset(id){return store.assets.find(a=>a.id===id)}
function openPrompt(id){if(!IS_ADMIN)return;let p=id?prompt(id):null,f=E.pf.elements;E.pt.textContent=p?'编辑提示词':'新增提示词';E.pf.reset();f.id.value=p?.id||'';f.title.value=p?.title||'';f.category.value=p?.category||(state.category!=='全部'?state.category:'');f.status.value=p?.status||'待验证';f.source.value=p?.source||'手动新增';f.tags.value=(p?.tags||[]).join(', ');f.variables.value=(p?.variables||[]).join(', ');f.summary.value=p?.summary||'';f.body.value=p?.body||'';E.pd.showModal()}
function savePrompt(e){e.preventDefault();if(!IS_ADMIN)return;let f=E.pf.elements,id=f.id.value,n=now(),old=prompt(id),p={id:id||uid('prompt'),title:f.title.value.trim(),category:f.category.value.trim()||'未分类',tags:arr(f.tags.value),variables:arr(f.variables.value),status:f.status.value.trim()||'待验证',summary:f.summary.value.trim(),body:f.body.value.trim(),source:f.source.value.trim()||'手动新增',createdAt:old?.createdAt||n,updatedAt:n,archived:old?.archived||false};let i=store.prompts.findIndex(x=>x.id===id);i>=0?store.prompts[i]=p:store.prompts.unshift(p);E.pd.close();markDirty(id?'提示词已写入草稿':'提示词已新增到草稿')}
function archivePrompt(id){let p=prompt(id);if(p&&confirm(`归档“${p.title}”？归档后发布才会对外生效。`)){p.archived=true;p.updatedAt=now();markDirty('已归档到草稿')}}
function restorePrompt(id){let p=prompt(id);if(p){p.archived=false;p.updatedAt=now();markDirty('已恢复到草稿')}}
function deletePrompt(id){let p=prompt(id);if(p&&confirm(`永久删除“${p.title}”的索引？发布后对外生效，已上传图片文件不会删除。`)){store.prompts=store.prompts.filter(x=>x.id!==id);store.assets.forEach(a=>a.relatedPromptIds=a.relatedPromptIds.filter(x=>x!==id));markDirty('已从草稿删除')}}
function openAsset(id){if(!IS_ADMIN)return;let a=asset(id);if(!a)return;let f=E.af.elements;E.at.textContent='编辑图片素材';E.af.reset();E.rs.innerHTML=active().map(p=>`<option value="${esc(p.id)}">${esc(p.title)}</option>`).join('');f.id.value=a.id;f.title.value=a.title;f.category.value=a.category;f.tags.value=(a.tags||[]).join(', ');f.notes.value=a.notes||'';[...E.rs.options].forEach(o=>o.selected=!!a.relatedPromptIds?.includes(o.value));E.ad.showModal()}
function saveAsset(e){e.preventDefault();if(!IS_ADMIN)return;let f=E.af.elements,id=f.id.value,a=asset(id);if(!a)return;a.title=f.title.value.trim();a.category=f.category.value.trim()||'未分类';a.tags=arr(f.tags.value);a.notes=f.notes.value.trim();a.relatedPromptIds=[...f.relatedPromptIds.selectedOptions].map(o=>o.value);a.updatedAt=now();E.ad.close();markDirty('图片素材索引已写入草稿')}
function deleteAsset(id){let a=asset(id);if(a&&confirm(`删除图片素材“${a.title}”的索引？GitHub 中已上传的图片文件会保留。`)){store.assets=store.assets.filter(x=>x.id!==id);markDirty('图片索引已从草稿删除')}}
function copyPrompt(id){let p=prompt(id);if(p)copyText(p.body,`已复制：${p.title}`)}
async function copyText(t,msg){try{navigator.clipboard?.writeText?await navigator.clipboard.writeText(t):fallback(t)}catch(e){fallback(t)}toast(msg||'已复制')}
function fallback(t){let x=document.createElement('textarea');x.value=t;x.style.position='fixed';x.style.left='-9999px';document.body.appendChild(x);x.select();document.execCommand('copy');x.remove()}
function hasPossibleSecret(){let t=JSON.stringify(publicLibrary());return SECRET_WORDS.some(w=>t.includes(w))||/\bsk-[A-Za-z0-9_-]{20,}\b/i.test(t)}
async function publishLibrary(){if(!IS_ADMIN||publishing||!draftDirty)return;if(hasPossibleSecret()){toast('草稿中疑似包含密钥，已阻止发布');return}publishing=true;render();try{let res=await fetch(API_LIBRARY,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({library:publicLibrary(),message:'Update prompt library'})}),data=await res.json().catch(()=>({}));if(!res.ok||!data.ok)throw new Error(data.error||`HTTP ${res.status}`);draftDirty=false;toast('已提交到 GitHub，等待自动部署完成后公开生效')}catch(e){toast(`发布失败：${e.message||e}`)}finally{publishing=false;render()}}
function blobToDataUrl(blob){return new Promise((res,rej)=>{let r=new FileReader();r.onload=()=>res(r.result);r.onerror=()=>rej(r.error);r.readAsDataURL(blob)})}
function dataUrlToBlob(url){let [h,b]=url.split(','),mime=(h.match(/data:(.*?);base64/)||[])[1]||'application/octet-stream',bin=atob(b),u=new Uint8Array(bin.length);for(let i=0;i<bin.length;i++)u[i]=bin.charCodeAt(i);return new Blob([u],{type:mime})}
async function exportJson(full){let payload={version:2,backupType:full?'full':'lite',backupScope:'personal',exportedAt:now(),store:publicLibrary(),images:[]};if(full){for(let a of store.assets){try{let src=assetPreviewSrc(a);if(!src)continue;let b=await fetch(src,{cache:'no-store'}).then(r=>r.ok?r.blob():null);if(b)payload.images.push({id:a.id,type:b.type,size:b.size,dataUrl:await blobToDataUrl(b)})}catch(e){console.warn(e)}}}let blob=new Blob([JSON.stringify(payload,null,2)],{type:'application/json;charset=utf-8'}),u=URL.createObjectURL(blob),a=document.createElement('a');a.href=u;a.download=`提示词网页仓库个人${full?'完整':'轻量'}备份-${new Date().toISOString().slice(0,10)}.json`;document.body.appendChild(a);a.click();a.remove();URL.revokeObjectURL(u);toast(full?'个人完整备份已导出':'个人轻量备份已导出')}
async function importJson(){if(!IS_ADMIN)return;let file=$('importJson').files?.[0];if(!file){toast('请先选择 JSON 文件');return}if(!confirm('导入会替换当前管理员草稿，不会立即改写公共库。确认继续？'))return;try{let raw=JSON.parse(await file.text()),next=norm(raw.store||raw),images=new Map(arr(raw.images).map(img=>[img.id,img]));for(let a of next.assets){if(a.src)continue;let img=images.get(a.id)||images.get(a.blobId)||images.get(a.thumbBlobId);if(!img?.dataUrl)continue;let uploaded=await uploadAssetBlob(dataUrlToBlob(img.dataUrl),{fileName:a.fileName||`${a.title}.png`,title:a.title,category:a.category,notes:a.notes,width:a.width,height:a.height});Object.assign(a,uploaded,{id:a.id,title:a.title,category:a.category,tags:a.tags,notes:a.notes,relatedPromptIds:a.relatedPromptIds})}store=next;state={view:'prompts',category:'全部',query:''};E.search.value='';draftDirty=true;render();toast('已导入为管理员草稿，请检查后发布')}catch(e){console.error(e);toast(`导入失败：${e.message||'JSON 格式不正确或图片数据损坏'}`)}}
let tt;function toast(m){E.toast.textContent=m;E.toast.classList.add('show');clearTimeout(tt);tt=setTimeout(()=>E.toast.classList.remove('show'),2600)}
E.tabs.forEach(t=>t.onclick=()=>{state.view=t.dataset.view;state.category='全部';render()});E.search.oninput=()=>{state.query=E.search.value;render()};$('clearSearch').onclick=()=>{E.search.value='';state.query='';render();E.search.focus()};document.querySelectorAll('[data-close]').forEach(b=>b.onclick=()=>$(b.dataset.close).close());E.vd.addEventListener('close',()=>{E.vi.removeAttribute('src')});E.pf.onsubmit=savePrompt;E.af.onsubmit=saveAsset;window.addEventListener('beforeunload',()=>localPreviewUrls.forEach(u=>URL.revokeObjectURL(u)));loadLibrary();
  </script>
