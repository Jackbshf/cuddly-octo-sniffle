      "body": "单人版本\r\n\r\n请参考上传的宫格分镜图 [Image1] 生成一条连续剧情短视频。\r\n\r\n核心要求：\r\n上传图片仅作为分镜布局、剧情结构、角色设定、场景关系、光线氛围、构图方式和镜头方向的参考，不作为人脸或肖像参考，不复刻任何具体面部特征，不生成宫格海报本身。\r\n\r\n生成规则：\r\n1. 不要把上传的宫格图直接生成进视频，不要出现九宫格边框、编号、字幕条、中文文字、黑色说明框、拼贴感画面。\r\n2. 只提取每个格子的有效信息：人物动作、场景内容、镜头景别、画面构图、视角方向、光线氛围、情绪变化、剧情推进关系。\r\n3. 严格按照“从左到右、从上到下”的顺序理解分镜，将九个格子的内容整合为一条完整连续、前后衔接自然的短片。\r\n4. 视频中保持同一原创主角设定，不换主角，不改变角色身份。角色统一性主要通过服装、发型轮廓、体型、配色、道具、动作习惯和整体气质来保持，不强调或复刻具体脸型与五官细节。\r\n5. 如果参考分镜中有不同景别，请自动将其转化为合理的连续镜头语言，例如：远景建立环境，中景推进动作，近景强化情绪，特写点到即止，但不要长时间停留在人脸特写上。\r\n6. 尽量多使用全景、中景、半身、侧身、背影、侧背、远景、跟拍等镜头表达；如需正面镜头，也不要突出面部细节，不要做人脸识别感很强的正脸大特写。\r\n7. 镜头之间必须自然连接，使用合理的电影化转场方式，例如：动作接动作、人物行进方向一致、镜头推进、轻微跟拍、轻微平移、轻微环绕、景别递进、前景遮挡转场、由近到远或由远到近的顺滑连接，不要生硬跳切。\r\n8. 整条视频要有清晰的节奏起伏：开头负责建立场景和人物，中段推进事件与情绪，结尾完成收束与情感落点，让短片具有完整观看感。\r\n9. 人物动作必须自然真实，符合物理逻辑和情绪逻辑，不夸张、不抽搐、不僵硬，不要突然改变姿势，不要突然闪现或消失。\r\n10. 场景切换要基于分镜逻辑自然发生，不要无原因瞬间跳到无关空间；若有场景变化，也要通过人物移动、视角转移、光线变化或镜头过渡完成。\r\n11. 视频整体风格为真实电影感，低饱和，轻微胶片颗粒，自然光影，层次清晰，镜头稳定，氛围统一，情绪细腻。\r\n12. 画面比例固定为竖版 9:16，适合抖音短视频观看。\r\n13. 画面中不要出现多余人物抢戏，不要突然新增核心角色；若分镜中本身有配角，也应弱化处理，重点始终围绕主角展开。\r\n14. 不要出现夸张变形、跳帧、镜头断裂、风格突变、角色突然换装、角色突然换发型、场景突然失真等问题。\r\n15. 主角必须是原创角色，不像任何明星，不像任何已有动漫、影视、游戏 IP，不带可识别肖像特征，不要真人脸参考感，不要数字人感，不要换脸感。\r\n\r\n输出目标：\r\n请把整组宫格分镜理解为一条已经设计好的短片分镜稿，将其转换成一条真正可播放的连续视频。视频需要从开头到结尾连贯发展，镜头之间具有明显的上下文关系，剧情推进自然，人物连续稳定，情绪递进清晰，最终形成一个完整、统一、具有电影感的竖版短片。\r\n\r\n风格补充：\r\n真实电影感，低饱和，轻胶片颗粒，自然光影，画面克制，高级感，叙事清晰，情绪稳定，不浮夸，不商业硬广化。",

      "body": "长提示词\r\n\r\n\r\n\r\n请参考上传的宫格分镜图 [Image1] 生成一条连续剧情短视频。\r\n\r\n【一、核心任务】\r\n将上传的宫格分镜理解为一份已经设计好的剧情短片分镜稿，而不是图片拼贴。\r\n请严格按照宫格“从左到右、从上到下”的顺序读取每一格，将每格中的人物动作、人物关系、场景内容、产品/道具、镜头景别、画面构图、视角方向、光线氛围、情绪变化、剧情推进关系和已有台词，整合成一条真正连续、完整、可播放、有电影感的竖版短视频。\r\n\r\n最终视频必须像同一时间、同一空间、同一组人物、同一事件的连续发展，而不是多个无关画面的拼接。\r\n\r\n【二、参考图使用规则】\r\n上传图片只作为分镜布局、剧情结构、角色设定、人物关系、场景关系、动作衔接、镜头方向、光线氛围、构图方式和台词内容参考。\r\n\r\n不要把上传图片当作真人脸、肖像或具体五官参考。\r\n不要复刻任何具体面部特征。\r\n不要生成宫格海报本身。\r\n不要出现宫格边框、拼贴感、编号、字幕条、中文字幕、英文字幕、台词框、黑色说明框、黑色文字框、海报排版、平台 UI、水印、logo、广告牌文字或任何屏幕文字。\r\n\r\n最终输出必须是一条真实连续视频，不是分镜板、漫画页、海报图或九宫格拼图。\r\n\r\n【三、角色与人物一致性】\r\n视频中的所有人物都必须是原创角色，不像任何明星、网红、动漫、影视、游戏 IP，不带可识别肖像特征。\r\n不要真人脸参考感，不要数字人感，不要换脸感，不要证件照式构图，不要连续正脸识别感很强的大特写。\r\n\r\n保持角色身份稳定：\r\n不换人，不突然变脸，不突然换装，不突然换发型，不改变体型、年龄感、气质、身份关系和人物定位。\r\n角色连续性主要通过服装、发型轮廓、体型比例、配色、代表性道具、动作习惯、站位关系和整体气质来保持，不强调或复刻具体五官细节。\r\n\r\n如果是单人剧情：\r\n始终围绕同一主角展开，不新增无关核心人物，不让路人或配角抢戏。\r\n\r\n如果是多人剧情：\r\n明确主角或主导视角，其余人物围绕主线互动。\r\n每位角色身份清晰，站位稳定，关系明确，不混淆角色。\r\n多人互动要自然，包括对视、倾听、停顿、点头、沉默、皱眉、递物、靠近、后退、转身、等待、跟随等真实反应。\r\n左侧人物不要无故跳到右侧，前后距离不要突然错乱，视线方向和互动方向必须匹配。\r\n\r\n【四、线稿/插画人物风格统一规则】\r\n如果参考图中人物与产品、道具、环境、场景画风不一致，例如人物是线稿、草图、漫画、插画风，而产品、空间或背景更接近写实、摄影感、电影感，则必须自动进行风格统一。\r\n\r\n统一原则：\r\n以产品、道具、环境和整体场景质感为基准，将人物自然转化为同一视觉体系下的真实电影感角色。\r\n人物原线稿或设定稿只作为角色造型蓝本。\r\n\r\n必须保留：\r\n发型轮廓、服装款式、体型比例、年龄感、气质、代表性配色、标志性道具、动作习惯、身份关系、站位逻辑和整体人物印象。\r\n\r\n只允许改变：\r\n表现形式、材质质感、光影渲染方式。\r\n\r\n不允许：\r\n换人、改人设、改服装逻辑、改发型逻辑、改身份定位、把角色变成另一个人。\r\n最终画面中人物、产品、道具、空间、背景、光线、色调和镜头语言必须统一，不要出现人物像插画、产品像照片、背景像电影截图的割裂感。\r\n\r\n【五、台词与声音规则】\r\n如果宫格中有文字台词，请读取每格已有台词，并将其理解为人物对白、旁白或内心独白。\r\n台词只作为声音和表演内容存在，画面中绝对不要显示任何字幕或文字。\r\n\r\n台词分配规则：\r\n如果一格中只有一个明确人物，台词优先分配给该人物。\r\n如果多人同框，根据人物站位、视线关系、动作互动、镜头焦点和剧情逻辑判断说话人。\r\n如果台词更适合作为旁白或内心独白，可自然处理为画外音或主角内心声音。\r\n台词可以轻微口语化，使对白更真实顺畅，但不要大幅改写原意，不要脱离原分镜台词内容。\r\n\r\n对白规则：\r\n每一句对白必须有明确说话人。\r\n不能两个人同时说话，不能多人同时抢台词，不能声音重叠。\r\n正在说话的人才可以张嘴，没说话的人保持倾听、表情反应或肢体动作。\r\n一个人说完，另一个人先反应，再回答，中间要有自然停顿、眼神交流、表情变化或动作承接。\r\n口型、表情、停顿、手势、身体动作和情绪变化必须与对白内容匹配。\r\n对白节奏要像真实交流，而不是机械配音朗读。\r\n\r\n【六、镜头语言与转场】\r\n根据原分镜自动组织合理的连续镜头语言：\r\n开头建立场景与人物关系。\r\n中段       "summary": "适合生成完整原创歌曲，覆盖曲风、人声、结构、歌词、编曲、混音和短视频切片。",
      "body": "请生成一首你当前支持的最长时长原创音乐。\r\n\r\n这首歌不是普通背景音乐，也不是平铺直叙的循环音乐。\r\n它必须是一首有完整结构、清晰情绪曲线、明确开头、主歌、预副歌、副歌、Bridge、最终高潮和结尾回收的原创歌曲。\r\n\r\n我的账号定位是：\r\n多风格 AI 原创音乐测试号，不固定单一人设，不固定单一世界观，不固定 sonic logo。\r\n但所有作品都要保持统一的审美标准：高级、有画面感、有情绪、有艺术化歌词、有短视频传播潜力。\r\n\r\n我的目标平台：\r\n抖音、国内音乐平台，同时兼顾 TikTok / YouTube Shorts / Spotify / Apple Music 后续分发。\r\n\r\n我的语言优先级：\r\n英文 50%，日文 30%，中文 20%。\r\n请根据本次曲风自动选择最合适的语言。\r\n如果是欧美风格，优先英文。\r\n如果是日系动画、City Pop、Future Bass、Piano Rock，优先日文。\r\n如果是国风、中文 R&B、中文情绪歌，使用中文。\r\n如果是 KR&B，可以使用英文为主，加入少量韩语氛围短句。\r\n\r\n我不确定固定人声，请根据曲风自动选择最合适的人声：\r\n欧美电影感流行：欧美女声或中性女声。\r\nDark Pop / Trap Soul：低沉男声、冷感女声或中性人声。\r\n日系动画 Rock：日系女声或少年感高亮人声。\r\n日系 City Pop：成熟温柔女声或中性女声。\r\nKR&B：柔和男声或女声，贴耳、克制。\r\nHyperpop / Glitch Pop：年轻女声或中性人声，可带轻微机械感。\r\nDream Pop / Shoegaze：空灵女声。\r\nBossa Nova / Jazz Pop：温柔女声或男女对唱。\r\n史诗电影 / Post-rock：可以无歌词或无词吟唱。\r\n高级广告电子：可以无完整歌词，只用 vocal chop 或短句。\r\n\r\n我最想避开的风格：\r\n不要土嗨。\r\n不要口水歌。\r\n不要网络伤感。\r\n不要太幼稚。\r\n不要太吵。\r\n不要廉价音色。\r\n不要像普通模板音乐。\r\n不要像短视频爆款拼贴曲。\r\n不要模仿任何现有歌手、歌曲、影视配乐、动漫歌曲、游戏原声或广告音乐。\r\n\r\n我希望音乐给人的感觉：\r\n高级、暗黑、治愈、孤独、热血、未来感、文艺、甜酷、电影感。\r\n可以根据曲风选择其中 2 到 4 个作为本首歌的核心气质。\r\n\r\n本次歌曲风格：\r\n【填写曲风，例如 English Cinematic Pop / Japanese Anime Rock / KR&B / Hyperpop / Dream Pop / Bossa Nova / Afro House / Trap Soul / City Pop / 国风 Trap / Lo-fi R&B】\r\n\r\n本次适用画面：\r\n【填写画面，例如城市夜景 / 动漫混剪 / 赛博未来 / 校园黄昏 / 海边 / 咖啡馆 / 机车跑车 / AI电影短片 / 游戏混剪 / 情绪文案】\r\n\r\n本次故事线：\r\n【填写故事线。如果我没有填写，请你根据曲风和画面自动生成一个完整故事线。】\r\n\r\n本次副歌核心句：\r\n【填写核心句。如果我没有填写，请你自动生成 3 个候选核心句，并选择最适合的一句写入歌曲。】\r\n\r\n====================\r\n【一、整体创作目标】\r\n====================\r\n\r\n请生成一首真正完整的原创音乐作品，而不是普通 BGM。\r\n\r\n它必须同时满足：\r\n1. 可以作为完整歌曲发布到音乐平台。\r\n2. 可以拆成 8 秒、15 秒、30 秒、60 秒短视频版本。\r\n3. 前 3 秒有记忆点。\r\n4. 副歌有传播性。\r\n5. 歌词有故事线。\r\n6. 歌词必须艺术化，不能白话。\r\n7. 编曲有层次，有起伏，有高潮，有结尾。\r\n8. 风格可以多样，但质感必须高级。\r\n\r\n整体优先级：\r\n艺术感 > 质感 > 情绪 > 传播性 > 卡点。\r\n不要为了短视频传播牺牲音乐审美。\r\n\r\n====================\r\n【二、BPM / 调性 / 节奏】\r\n====================\r\n\r\n请根据曲风自动选择合适 BPM。\r\n\r\n参考：\r\nLo-fi R&B / KR&B / Trap Soul：65-90 BPM。\r\nCinematic Pop / Indie Folk / Piano Rock：78-100 BPM。\r\nCity Pop / Bossa Nova / Nu-Disco：92-124 BPM。\r\nAfro House / Progressive House：118-128 BPM。\r\nHyperpop / J-Rock / Anime OP：145-180 BPM。\r\nPhonk / Drift / 高速卡点：150-170 BPM。\r\nPost-rock / Cinematic Instrumental：68-90 BPM。\r\n\r\n节拍：\r\n默认 4/4，除非曲风需要特殊律动。\r\n\r\n调性：\r\n根据情绪选择。\r\n暗黑、孤独、电影感：小调或明亮小调。\r\n治愈、文艺、旅行：大调带一点忧伤。\r\n热血、动画感：明亮小调转大调。\r\n复古、City Pop、Bossa：大调中带一点小调转折。\r\n\r\n节奏要求：\r\n鼓点要服务情绪，不要只为了卡点。\r\n副歌和 drop 必须明显比主歌更有冲击力。\r\n整首歌不能从头到尾一个强度。\r\n必须有留白、推进、爆发、回落和结尾余韵。\r\n\r\n====================\r\n【三、主旋律 Hook 设计】\r\n====================\r\n\r\n请设计一个非常清晰、容易记住的主旋律 hook。\r\n\r\nHook 要求：\r\n1. 长度控制在 4 到 8 个音符之间。\r\n2. 开头必须出现一次，让听众立刻记住。\r\n3. 副歌必须再次出现，可以由人声、合成器或主乐器重复。\r\n4. 结尾必须回收这个 hook，让歌曲有完整闭环。\r\n5. Hook 要简单、抓耳、有辨识度，适合短视频反复使用。\r\n6. Hook 不能像儿歌，不能廉价，不能土。\r\n7. Hook 要有情绪，不只是旋律上口。\r\n\r\n请根据风格自动选择 Hook 音色：\r\n欧美电影感：钢琴、弦乐、女声 humming。\r\n日系动画：电吉他、钢琴高速 riff、synth lead。\r\nCity Pop：Rhodes、电钢琴、funk guitar、sax。\r\nKR&B：Rhodes、guitar pluck、vocal chop。\r\nHyperpop：glitch vocal chop、digital pluck、bitcrush synth。\r\nDream Pop：reverb guitar、chorus guitar、空灵女声。\r\nBossa Jazz：nylon guitar、jazz piano、flute、sax。\r\n广告电子：glass synth、metallic pluck、sonic logo-like hook。\r\n暗黑电子：dark synth、低频 pulse、whisper hook。\r\nPost-rock：delay guitar、钢琴单音、环境 guitar motif。\r\n\r\n====================\r\n【四、编曲与乐器层次】\r\n====================\r\n\r\n请根据曲风自动选择乐器，但必须遵守分层进入。\r\n\r\n开头不要所有乐器一起进。\r\n必须分层进入，形成情绪递进。\r\n\r\n0:00-0:08 开头：\r\n只使用最有辨识度的 hook 乐器 + 环境音 + 少量低频。\r\n这一段必须适合剪成 8 秒短视频开头。\r\n前 3 秒必须抓人，但不要廉价炸场。\r\n\r\n主歌：\r\n乐器要克制。\r\n重点是人物、场景、故事和情绪铺垫。\r\n人声要清楚。\r\n不要一开始就爆满。\r\n\r\n预副歌：\r\n逐渐加入鼓点、弦乐、riser、和声、pad 或低频。\r\n情绪必须明显上升。\r\n副歌前必须有一个短暂停顿、吸气感、低频落点或明显转场。\r\n\r\n副歌：\r\n鼓组、低频、主旋律、人声和和声全部打开。\r\n副歌必须比主歌更宽、更亮、更有冲击力。\r\n副歌不能只是音量变大，必须有旋律记忆点。\r\n\r\n间奏 / Drop / Solo：\r\n根据曲风选择：\r\n电子 drop、吉他 solo、sax solo、vocal chop、国风乐器间奏、电影感器乐推进、dance break、post-rock build up。\r\n这一段要适合短视频卡点、转场、动漫混剪或城市夜景画面。\r\n\r\nBridge：\r\n突然降低能量。\r\n只保留核心乐器和人声。\r\n这里要给故事和情绪转折留空间。\r\nBridge 不能重复主歌意思，必须让主角的内心真正发生变化。\r\n\r\n最终副歌：\r\n比第一次副歌更强。\r\n可以加入更厚和声、更宽弦乐、更强鼓组、更高主旋律。\r\n不能只是复制第一次副歌。\r\n同一个核心句可以再次出现，但意义必须升级。\r\n\r\n结尾：\r\n逐渐减少乐器。\r\n回到开头 hook。\r\n留下余韵。\r\n不能突然断掉。\r\n结尾要适合短视频收尾，也要适合完整版歌曲结束。\r\n\r\n====================\r\n【五、歌曲结构】\r\n====================\r\n\r\n请严格按照以下结构生成：\r\n\r\n0:00-0:08 开头 Hook\r\n前 3 秒必须抓人。\r\n用本曲最有辨识度的乐器或 vocal hook 演奏核心旋律。\r\n加入环境音或氛围音，制造画面感。\r\n不要一开始就全乐器进入。\r\n\r\n0:08-0:35 主歌一\r\n主歌要讲故事。\r\n人声贴近、清晰、有情绪。\r\n编曲克制。\r\n歌词要交代人物、地点、当下处境，但不要写成日记。\r\n\r\n0:35-1:05 预副歌\r\n情绪开始上升。\r\n鼓点、弦乐、pad、riser 或和声逐渐加入。\r\n歌词从处境转向心理变化。\r\n副歌前必须有一个短暂停顿或明显转场。\r\n\r\n1:05-1:35 第一次副歌\r\n这是全曲最重要的记忆点之一。\r\n副歌旋律必须抓耳。\r\n核心歌词必须出现。\r\n副歌适合剪成 15 秒短视频片段。\r\n副歌可以更直接，但仍然必须有诗意。\r\n\r\n1:35-2:05 间奏 / Drop / Solo\r\n根据曲风选择合适形式。\r\n这一段要适合城市夜景、动漫混剪、剧情转场、舞蹈动作或视觉展示。\r\n不能只是重复副歌伴奏。\r\n\r\n2:05-2:35 Bridge\r\n能量降低。\r\n只保留少量乐器。\r\n歌词或旋律必须出现真正的内心转折。\r\n不能重复主歌意思。\r\n这里是全曲最深的一句或最有余韵的一段。\r\n\r\n2:35-结尾 最终副歌 + Outro\r\n最终副歌必须比第一次副歌更强。\r\n同一个核心 hook 再次出现，但情绪意义要升级。\r\n结尾回收开头意象或旋律，形成完整闭环。\r\n\r\n====================\r\n【六、歌词故事线】\r\n====================\r\n\r\n如果这首歌包含歌词，请先在内部明确一个完整故事线，再写歌词。\r\n\r\n歌词必须有：\r\n主角、场景、事件、冲突、转折、结尾。\r\n\r\n但不要像作文一样直接讲故事。\r\n故事必须藏在画面、动作、意象和隐喻里。\r\n\r\n故事主角：\r\n根据曲风自动选择。\r\n可以是：\r\n一个夜晚开车离开过去的人。\r\n一个在城市里被孤独吞没但仍向前的人。\r\n一个不敢告白的日系少女。\r\n一个即将毕业的学生。\r\n一个站在舞台前不敢发光的人。\r\n一个从海边重新找回呼吸的人。\r\n一个在暗夜中冷静反击的人。\r\n一个在旧车站与回忆告别的人。\r\n一个走在未来城市里的虚拟角色。\r\n一个从废墟中重新出发的旅人。\r\n\r\n故事场景：\r\n优先选择有画面感的场景：\r\n城市夜景、雨夜车站、末班电车、海边小镇、校园黄昏、复古舞厅、咖啡馆、未来都市、雪山、公路、蓝色屏幕前的房间、旧码头、天台、便利店、地下车库。\r\n\r\n故事开端：\r\n主角一开始必须处于某种不完整状态：\r\n孤独、迷茫、逃避、暧昧、疲惫、压抑、即将告别、被低估、想说却说不出口、想走但不敢走。\r\n\r\n故事冲突：\r\n主角必须面对一个内在或外在冲突：\r\n不敢说出口。\r\n无法放下过去。\r\n被低估。\r\n想离开又害怕。\r\n明知道不该回头。\r\n想证明自己但又怀疑自己。\r\n想忘记但某个场景不断提醒他。\r\n想发光但害怕被看见。\r\n\r\n故事转折：\r\n必须有一个具体瞬间让情绪改变：\r\n看到一盏灯。\r\n收到一条未读消息。\r\n走过旧路口。\r\n听见鼓点。\r\n关掉手机。\r\n站上舞台。\r\n看见海。\r\n车驶过隧道。\r\n电车门关闭。\r\n屏幕黑掉。\r\n风吹散旧纸片。\r\n城市天亮。\r\n\r\n故事结尾：\r\n结尾不是简单胜利。\r\n而是主角获得一种变化：\r\n释怀、离开、重启、接受自己、重新出发、把回忆留在原地、终于不再回头、终于敢说出口、终于理解孤独不是失败。\r\n\r\n歌词段落逻辑：\r\n主歌一：交代主角、地点、处境。\r\n预副歌：主角意识到问题，情绪开始变化。\r\n副歌：主角唱出最核心的选择或情绪。\r\n第二段 / 间奏后段：故事继续推进，不能重复第一段。\r\nBridge：主角发生真正的内心转折。\r\n最终副歌：同一句核心歌词再次出现，但意义升级。\r\n结尾：回到开头意象，但含义发生变化。\r\n\r\n====================\r\n【七、歌词艺术化要求】\r\n====================\r\n\r\n这是最重要的部分。\r\n\r\n歌词必须有故事线，但不能白话。\r\n歌词不能像日记。\r\n不能像作文。\r\n不能像短视频文案。\r\n不能像普通网络伤感句子。\r\n不能像故事梗概。\r\n\r\n故事要藏在意象、画面、动作和隐喻里，让听众自己感受到情绪。\r\n\r\n不要直接说：\r\n我很难过。\r\n我很孤独。\r\n我想你。\r\n我要重新开始。\r\n我不会放弃。\r\n我要追梦。\r\n你离开了我。\r\n我终于明白。\r\n我决定向前。\r\n我不再害怕。\r\n\r\n这些意思可以存在，但必须用更艺术化的方式表达。\r\n\r\n请使用：\r\n意象、隐喻、象征、留白、重复、对比、细节动作、环境映射情绪。\r\n\r\n表达示例：\r\n不要写“我很想你”\r\n可以写成“雨把你的名字敲在窗上”。\r\n\r\n不要写“我很孤独”\r\n可以写成“最后一班车带走了街灯的回声”。\r\n\r\n不要写“我要重新开始”\r\n可以写成“我把旧梦折进风里，等天亮重新命名自己”。\r\n\r\n不要写“我不会放弃”\r\n可以写成“鞋底磨破夜色，我仍把黎明攥在手心”。\r\n\r\n不要写“我离开过去”\r\n可以写成“我把影子留在旧站台，空车开向天亮”。\r\n\r\n不要写“我很害怕告白”\r\n可以写成“光标在蓝色屏幕上发抖，心跳比发送键更响”。\r\n\r\n不要写“我释怀了”\r\n可以写成“海浪磨平旧名字，我终于听见自己的呼吸”。\r\n\r\n中文歌词要求：\r\n要有现代诗感、东方留白、都市画面感。\r\n避免口水化、鸡汤化、网络热词化。\r\n可以使用雨、霓虹、街灯、车窗、旧票根、风、月台、海岸、镜子、影子、便利店、天台等意象。\r\n但不能堆砌意象，每个意象都要服务故事。\r\n\r\n英文歌词要求：\r\n要有 cinematic pop / indie pop / alt-pop 的诗性表达。\r\n避免 I miss you, I feel alone, I will be strong 这种普通句子。\r\n多使用 metaphor、sensory imagery、internal rhyme。\r\n句子要自然可唱，不要翻译腔。\r\n歌词要像真正的英文歌，而不是中文直译。\r\n\r\n日文歌词要求：\r\n要有余韵、季节感、青春感和画面感。\r\n可以使用 雨、夕焼け、窓、影、風、光、駅、夜明け、青い画面、改札、手紙 等意象。\r\n不要写成说明文。\r\n要像动画主题曲或片尾曲中的诗意表达。\r\n\r\n韩文 / KR&B 歌词要求：\r\n要克制、暧昧、有留白。\r\n可以用冰块、街灯、伞边雨滴、杯口、未读消息、夜色、香水残留表达拉扯。\r\n不要写成短剧对白。\r\n不要过度狗血。\r\n\r\n副歌要求：\r\n副歌可以比主歌更直接，但仍然要有诗意。\r\n副歌核心句必须简单、抓耳、有力量。\r\n它应该像一句可以被记住的诗，而不是普通口号。\r\n副歌不能太复杂，必须适合短视频传播。\r\n\r\nBridge 要求：\r\nBridge 必须写内心最深的转折。\r\n不能重复主歌内容。\r\n要让主角真正发生变化。\r\nBridge 最好出现全曲最有余韵的一句。\r\n\r\n最终副歌要求：\r\n最终副歌不能只是复制第一次副歌。\r\n同一句核心歌词可以再次出现，但意义要升级。\r\n第一次是挣扎中的愿望。\r\n最后一次是完成选择后的答案。\r\n\r\n====================\r\n【八、副歌核心句】\r\n====================\r\n\r\n请围绕下面这句核心歌词设计副歌：\r\n\r\n【填写核心句】\r\n\r\n如果我没有提供核心句，请你根据故事线自动生成 3 个候选核心句。\r\n候选句必须满足：\r\n1. 像一句诗。\r\n2. 不像口号。\r\n3. 不像鸡汤。\r\n4. 不像网络文案。\r\n5. 适合演唱。\r\n6. 适合短视频传播。\r\n7. 不模仿任何现有歌词。\r\n\r\n然后选择最适合的一句写入歌曲。\r\n\r\n核心句使用要求：\r\n第一次副歌出现一次。\r\n最终副歌再次出现，但意义升级。\r\n可以重复，但不能机械重复。\r\n每次出现时，前后语境必须不同。\r\n\r\n====================\r\n【九、混音与声音质感】\r\n====================\r\n\r\n整体混音要求：\r\n声音要干净、有空间、有层次。\r\n人声要靠前、清晰、自然。\r\n低频要有力量但不能浑浊。\r\n鼓组要有冲击力，但不能压过人声。\r\n主旋律 hook 必须清楚。\r\n副歌必须明显比主歌更宽、更亮、更强。\r\nBridge 必须明显收窄，制造情绪反差。\r\n结尾必须有余韵，不能突然断。\r\n\r\n声音质感根据曲风自动选择：\r\n高级广告：干净、极简、玻璃感、金属质感。\r\n欧美电影感：宽广、弦乐、钢琴、人声空间。\r\n日系动画：明亮、速度感、吉他冲击力。\r\nCity Pop：温暖、复古、顺滑、bass 有 groove。\r\nKR&B：贴耳、夜晚、低频柔软。\r\nHyperpop：失真、glitch、数字感，但不能刺耳。\r\nDream Pop：雾感、混响、胶片感。\r\nBossa / Jazz：温暖、自然、咖啡馆空间。\r\nPost-rock：动态大、吉他空间感、爆发有墙感。\r\nAfro House：深、律动、有机打击乐。\r\n\r\n禁止：\r\n不要廉价音色。\r\n不要所有乐器挤在一起。\r\n不要低频糊。\r\n不要人声被伴奏盖住。\r\n不要整首歌音量和能量都一样。\r\n不要过度压缩导致没有动态。\r\n不要为了炸而炸。\r\n\r\n====================\r\n【十、短视频切片要求】\r\n====================\r\n\r\n请让这首歌天然适合拆成以下版本：\r\n\r\n8 秒版：\r\n使用 0:00-0:08 的开头 hook，适合短视频开场。\r\n必须能单独成立。\r\n\r\n15 秒版：\r\n使用第一次副歌最抓耳的部分，适合抖音、TikTok、YouTube Shorts 爆款片段。\r\n\r\n30 秒版：\r\n使用预副歌 + 副歌，适合剧情短片、情绪剪辑、动漫混剪、城市夜景。\r\n\r\n60 秒版：\r\n使用主歌 + 预副歌 + 副歌，适合完整情绪表达。\r\n\r\n完整版：\r\n有完整起承转合，适合音乐平台发布。\r\n\r\n请在音乐结构中自然保留这些可切片位置，不要让短视频片段听起来像硬截断。\r\n\r\n====================\r\n【十一、版本生成要求】\r\n====================\r\n\r\n请一次生成 2 个不同版本：\r\n\r\nA 版：艺术完整版本\r\n歌词更艺术化，氛围更高级，适合音乐平台正式发布。\r\n段落情绪更完整，Bridge 更有深度。\r\n\r\nB 版：短视频传播版本\r\n开头更抓耳，副歌更集中，15 秒片段更容易传播。\r\n但不能土嗨，不能口水，不能牺牲审美。\r\n\r\n两个版本必须保留同一个故事线。\r\n但副歌旋律、编曲层次和情绪处理要有区别。\r\n\r\n====================\r\n【十二、商用资产包意识】\r\n====================\r\n\r\n请让这首歌后续适合导出为：\r\n1. 完整版\r\n2. 伴奏版\r\n3. 无人声版\r\n4. 8 秒 hook 版\r\n5. 15 秒副歌版\r\n6. 30 秒广告版\r\n7. 60 秒剧情版\r\n8. loop 循环版\r\n9. 纯 drop / solo 版\r\n10. 简化版，例如纯钢琴、纯吉他、纯 synth 或纯氛围版\r\n\r\n生成时要考虑这些版本的可拆分性。\r\n\r\n====================\r\n【十三、视觉画面要求】\r\n====================\r\n\r\n这首歌必须适合视觉化。\r\n请让每个段落都有对应画面感：\r\n\r\n开头：\r\n一个能立刻抓人的画面。\r\n\r\n主歌：\r\n具体人物和场景。\r\n\r\n预副歌：\r\n情绪开始变化的画面。\r\n\r\n副歌：\r\n主角做出选择或情绪爆发的画面。\r\n\r\n间奏 / Drop：\r\n适合城市夜景、动漫混剪、角色出场、广告产品、舞蹈转场或视觉冲击。\r\n\r\nBridge：\r\n主角真正面对自己的画面。\r\n\r\n最终副歌：\r\n情绪升华的画面。\r\n\r\n结尾：\r\n回收开头意象，但意义发生变化。\r\n\r\n====================\r\n【十四、生成后自检】\r\n====================\r\n\r\n生成后请自动检查：\r\n\r\n1. 前 3 秒是否抓人？\r\n2. 主旋律 hook 是否清晰？\r\n3. 副歌是否有记忆点？\r\n4. 歌词是否太白话？\r\n5. 歌词是否像作文、日记或短视频文案？\r\n6. 歌词是否有故事线？\r\n7. 故事是否藏在意象里，而不是直接讲出来？\r\n8. 主歌、预副歌、副歌、Bridge、最终副歌是否有情绪升级？\r\n9. 编曲是否有层次？\r\n10. 是否有明显开头、高潮、结尾？\r\n11. 是否避开土嗨、口水、网络伤感、太幼稚、太吵？\r\n12. 是否适合 8 秒、15 秒、30 秒、60 秒切片？\r\n13. 是否没有模仿任何现有歌手或歌曲？\r\n\r\n如果发现问题，请保留曲风和故事线，重新生成更高级、更艺术化、更有层次的版本。\r\n\r\n====================\r\n【十五、禁止项】\r\n====================\r\n\r\n不要生成平淡背景音乐。\r\n不要整首歌只有一个循环。\r\n不要只有鼓点没有旋律。\r\n不要只有氛围没有高潮。\r\n不要副歌和主歌差不多。\r\n不要歌词白话。\r\n不要写成故事梗概。\r\n不要写成短视频文案。\r\n不要网络伤感口水词。\r\n不要鸡汤口号。\r\n不要土嗨。\r\n不要太幼稚。\r\n不要太吵。\r\n不要廉价音色。\r\n不要模仿任何现有歌手、歌曲、影视配乐、游戏原声、动漫歌曲或广告音乐。\r\n不要使用已有旋律。\r\n不要使用已有歌词。\r\n不要直接写“像某某歌手”。\r\n不要过度堆砌音效导致混乱。\r\n不要结尾突然停止。\r\n\r\n最终目标：\r\n生成一首有明确曲风、有故事、有艺术化歌词、有开头记忆点、有副歌爆发、有 Bridge 转折、有最终高潮、有结尾回收，并且适合抖音传播、国内音乐平台发布、后续授权变现的原创音乐作品。",

async function hydrateThumbs(){for(let box of E.content.querySelectorAll('[data-viewimg]')){let a=asset(box.dataset.viewimg);if(!a?.thumbBlobId)continue;let b=await getBlob(a.thumbBlobId);if(!b){box.textContent='缩略图未找到';continue}let u=URL.createObjectURL(b);box.innerHTML=`<img src="${u}" alt="${esc(a.title)}">`;box.querySelector('img').onload=()=>setTimeout(()=>URL.revokeObjectURL(u),1000)}}
async function viewImage(id){let a=asset(id);if(!a)return;let b=await getBlob(a.blobId)||await getBlob(a.thumbBlobId);if(!b&&a.src){E.vi.src=a.src}else if(b){if(currentViewerUrl)URL.revokeObjectURL(currentViewerUrl);currentViewerUrl=URL.createObjectURL(b);E.vi.src=currentViewerUrl}else{toast('原图未找到');return}E.vt.textContent=a.title;E.vd.showModal()}
function renderBackup(){E.content.innerHTML=`<div class="panel"><div class="stats"><div class="stat"><strong>${active().length}</strong><span>当前提示词</span></div><div class="stat"><strong>${arch().length}</strong><span>归档提示词</span></div><div class="stat"><strong>${store.prompts.length}</strong><span>提示词总数</span></div><div class="stat"><strong>${store.assets.length}</strong><span>图片素材</span></div></div><div><div class="label">导出</div><div class="actions" style="justify-content:flex-start"><button class="primary" id="exportLite">导出轻量备份</button><button id="exportFull">导出完整备份（含图片）</button><span class="badge">完整备份可能很大</span></div></div><div><div class="label">导入</div><div class="actions" style="justify-content:flex-start"><input id="importJson" type="file" accept="application/json,.json" style="max-width:360px"><button id="importSelected">导入并替换当前库</button></div></div><div><div class="label">维护</div><div class="actions" style="justify-content:flex-start"><button class="warn" id="restoreEmbedded">恢复内置 9 条提示词</button><button class="danger" id="clearLocal">清空本地数据和图片</button></div></div></div>`;$('exportLite').onclick=()=>exportJson(false);$('exportFull').onclick=()=>exportJson(true);$('importSelected').onclick=importJson;$('restoreEmbedded').onclick=restoreEmbedded;$('clearLocal').onclick=clearLocal}
function prompt(id){return store.prompts.find(p=>p.id===id)}function asset(id){return store.assets.find(a=>a.id===id)}
function openPrompt(id){let p=id?prompt(id):null,f=E.pf.elements;E.pt.textContent=p?'编辑提示词':'新增提示词';E.pf.reset();f.id.value=p?.id||'';f.title.value=p?.title||'';f.category.value=p?.category||(state.category!=='全部'?state.category:'');f.status.value=p?.status||'待验证';f.source.value=p?.source||'手动新增';f.tags.value=(p?.tags||[]).join(', ');f.variables.value=(p?.variables||[]).join(', ');f.summary.value=p?.summary||'';f.body.value=p?.body||'';E.pd.showModal()}
function savePrompt(e){e.preventDefault();let f=E.pf.elements,id=f.id.value,n=now(),old=prompt(id),p={id:id||uid('prompt'),title:f.title.value.trim(),category:f.category.value.trim()||'未分类',tags:arr(f.tags.value),variables:arr(f.variables.value),status:f.status.value.trim()||'待验证',summary:f.summary.value.trim(),body:f.body.value.trim(),source:f.source.value.trim()||'手动新增',createdAt:old?.createdAt||n,updatedAt:n,archived:old?.archived||false};let i=store.prompts.findIndex(x=>x.id===id);i>=0?store.prompts[i]=p:store.prompts.unshift(p);E.pd.close();save();toast(id?'提示词已更新':'提示词已新增')}
function archivePrompt(id){let p=prompt(id);if(p&&confirm(`归档“${p.title}”？归档后可恢复。`)){p.archived=true;p.updatedAt=now();save();toast('已归档')}}function restorePrompt(id){let p=prompt(id);if(p){p.archived=false;p.updatedAt=now();save();toast('已恢复')}}function deletePrompt(id){let p=prompt(id);if(p&&confirm(`永久删除“${p.title}”？此操作不能撤销。`)){store.prompts=store.prompts.filter(x=>x.id!==id);store.assets.forEach(a=>a.relatedPromptIds=a.relatedPromptIds.filter(x=>x!==id));save();toast('已永久删除')}}
function openAsset(id){let a=asset(id);if(!a)return;let f=E.af.elements;E.at.textContent='编辑图片素材';E.af.reset();E.rs.innerHTML=active().map(p=>`<option value="${esc(p.id)}">${esc(p.title)}</option>`).join('');f.id.value=a.id;f.title.value=a.title;f.category.value=a.category;f.tags.value=(a.tags||[]).join(', ');f.notes.value=a.notes||'';[...E.rs.options].forEach(o=>o.selected=!!a.relatedPromptIds?.includes(o.value));E.ad.showModal()}
function saveAsset(e){e.preventDefault();let f=E.af.elements,id=f.id.value,a=asset(id);if(!a)return;a.title=f.title.value.trim();a.category=f.category.value.trim()||'未分类';a.tags=arr(f.tags.value);a.notes=f.notes.value.trim();a.relatedPromptIds=[...f.relatedPromptIds.selectedOptions].map(o=>o.value);a.updatedAt=now();E.ad.close();save();toast('图片素材已更新')}
async function deleteAsset(id){let a=asset(id);if(a&&confirm(`删除图片素材“${a.title}”？会同时删除网页本地保存的原图和缩略图。`)){await delBlob(a.blobId);await delBlob(a.thumbBlobId);store.assets=store.assets.filter(x=>x.id!==id);save();toast('图片素材已删除')}}
function copyPrompt(id){let p=prompt(id);if(p)copyText(p.body,`已复制：${p.title}`)}async function copyText(t,msg){try{navigator.clipboard?.writeText?await navigator.clipboard.writeText(t):fallback(t)}catch(e){fallback(t)}toast(msg||'已复制')}function fallback(t){let x=document.createElement('textarea');x.value=t;x.style.position='fixed';x.style.left='-9999px';document.body.appendChild(x);x.select();document.execCommand('copy');x.remove()}
function blobToDataUrl(blob){return new Promise((res,rej)=>{let r=new FileReader();r.onload=()=>res(r.result);r.onerror=()=>rej(r.error);r.readAsDataURL(blob)})}function dataUrlToBlob(url){let [h,b]=url.split(','),mime=(h.match(/data:(.*?);base64/)||[])[1]||'application/octet-stream',bin=atob(b),u=new Uint8Array(bin.length);for(let i=0;i<bin.length;i++)u[i]=bin.charCodeAt(i);return new Blob([u],{type:mime})}
async function exportJson(full){let payload={version:2,backupType:full?'full':'lite',exportedAt:now(),store:norm(store),images:[]};if(full){let ids=[...new Set(store.assets.flatMap(a=>[a.blobId,a.thumbBlobId]).filter(Boolean))];for(let id of ids){let b=await getBlob(id);if(b)payload.images.push({id,type:b.type,size:b.size,dataUrl:await blobToDataUrl(b)})}}let blob=new Blob([JSON.stringify(payload,null,2)],{type:'application/json;charset=utf-8'}),u=URL.createObjectURL(blob),a=document.createElement('a');a.href=u;a.download=`提示词网页仓库${full?'完整':'轻量'}备份-${new Date().toISOString().slice(0,10)}.json`;document.body.appendChild(a);a.click();a.remove();URL.revokeObjectURL(u);toast(full?'完整备份已导出':'轻量备份已导出')}
async function importJson(){let file=$('importJson').files?.[0];if(!file){toast('请先选择 JSON 文件');return}if(!confirm('导入会替换当前本地库和图片数据库。确认继续？'))return;try{let raw=JSON.parse(await file.text()),next=norm(raw.store||raw);await clearDB();if(raw.images?.length)for(let img of raw.images)await putBlob(img.id,dataUrlToBlob(img.dataUrl));store=next;localStorage.setItem(KEY,JSON.stringify(store));state={view:'prompts',category:'全部',query:''};E.search.value='';render();toast('导入完成')}catch(e){console.error(e);toast('导入失败：JSON 格式不正确或图片数据损坏')}}
async function restoreEmbedded(){if(confirm('恢复内置 9 条会替换当前本地库和图片数据库。确认继续？')){await clearDB();store=norm(init);localStorage.setItem(KEY,JSON.stringify(store));state={view:'prompts',category:'全部',query:''};E.search.value='';render();toast('已恢复内置数据')}}async function clearLocal(){if(confirm('清空本地数据会移除当前提示词、归档和图片。确认继续？')){await clearDB();store=norm({prompts:[],assets:[]});localStorage.setItem(KEY,JSON.stringify(store));state={view:'prompts',category:'全部',query:''};E.search.value='';render();toast('本地数据已清空')}}
let tt;function toast(m){E.toast.textContent=m;E.toast.classList.add('show');clearTimeout(tt);tt=setTimeout(()=>E.toast.classList.remove('show'),2200)}
E.tabs.forEach(t=>t.onclick=()=>{state.view=t.dataset.view;state.category='全部';render()});E.search.oninput=()=>{state.query=E.search.value;render()};$('clearSearch').onclick=()=>{E.search.value='';state.query='';render();E.search.focus()};document.querySelectorAll('[data-close]').forEach(b=>b.onclick=()=>$(b.dataset.close).close());E.vd.addEventListener('close',()=>{if(currentViewerUrl){URL.revokeObjectURL(currentViewerUrl);currentViewerUrl=null}E.vi.removeAttribute('src')});E.pf.onsubmit=savePrompt;E.af.onsubmit=saveAsset;render();
  </script>
