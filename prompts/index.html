<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>提示词网页仓库</title>
  <style>
    :root{--bg:#f5f6f3;--panel:#fff;--soft:#eef4f1;--soft2:#f8fbfa;--text:#202421;--muted:#657067;--border:#d8dfda;--accent:#0f766e;--accent2:#0b5f59;--warn:#b45309;--danger:#b91c1c;--ok:#15803d;--shadow:0 10px 26px rgba(22,31,27,.08);--r:8px}
    *{box-sizing:border-box}
    html,body{overflow-x:hidden}
    body{margin:0;min-height:100vh;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Microsoft YaHei",Arial,sans-serif;line-height:1.55}
    img{max-width:100%}
    [hidden]{display:none!important}
    header{position:sticky;top:0;z-index:20;border-bottom:1px solid var(--border);background:rgba(245,246,243,.94);backdrop-filter:blur(12px)}
    .top{max-width:1460px;margin:auto;padding:16px 24px 12px;display:grid;grid-template-columns:1fr auto;gap:18px;align-items:end}
    h1{margin:0 0 4px;font-size:24px;line-height:1.2}
    .sub{margin:0;color:var(--muted);font-size:13px}
    .mode{display:inline-flex;margin-left:8px;vertical-align:middle}
    .tabs,.actions{display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end}
    button,.buttonlike{min-height:38px;border:1px solid var(--border);border-radius:var(--r);background:var(--panel);color:var(--text);padding:7px 11px;font:13px inherit;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;justify-content:center;gap:6px}
    button:hover,.buttonlike:hover{border-color:var(--accent);color:var(--accent)}
    button:disabled{cursor:not-allowed;opacity:.55}
    .primary,.tab.active{border-color:var(--accent);background:var(--accent);color:#fff}
    .primary:hover,.tab.active:hover{background:var(--accent2);color:#fff}
    .danger{border-color:rgba(185,28,28,.35);color:var(--danger)}
    .warn{border-color:rgba(180,83,9,.35);color:var(--warn)}
    main{max-width:1460px;margin:auto;padding:20px 24px 44px;display:grid;grid-template-columns:290px 1fr;gap:20px;align-items:start}
    aside,.card,.panel,.asset-toolbar,.batchbar,.importer{border:1px solid var(--border);border-radius:var(--r);background:var(--panel);box-shadow:var(--shadow);overflow:hidden}
    aside{position:sticky;top:88px}
    .ah{padding:13px 14px 10px;border-bottom:1px solid var(--border);background:var(--soft);font-weight:700;display:flex;justify-content:space-between;gap:10px}
    .filters{padding:10px;display:grid;gap:10px}
    input,textarea,select{width:100%;border:1px solid var(--border);border-radius:var(--r);background:#fff;color:var(--text);padding:9px 10px;font:14px inherit;outline:none}
    textarea{min-height:120px;resize:vertical;line-height:1.6}
    input:focus,textarea:focus,select:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(15,118,110,.14)}
    .cat{width:100%;display:flex;justify-content:space-between;gap:8px;text-align:left;border-color:transparent;background:transparent}
    .cat.active{background:rgba(15,118,110,.1);color:var(--accent);border-color:rgba(15,118,110,.28)}
    .pill{min-width:26px;height:22px;padding:0 7px;display:inline-flex;align-items:center;justify-content:center;border-radius:999px;background:#eef0ee;color:var(--muted);font-size:12px}
    .notice{margin:0 10px 12px;padding:10px;border:1px solid rgba(15,118,110,.2);border-radius:var(--r);color:#25534e;background:var(--soft2);font-size:12px}
    .notice.warn{border-color:rgba(180,83,9,.25);color:#7c2d12;background:#fff7ed}
    .head{display:flex;justify-content:space-between;gap:12px;align-items:center;margin-bottom:12px}
    .head h2{margin:0;font-size:18px}
    .grid{display:grid;gap:12px}
    .card-main{padding:16px}
    .card-top{display:flex;justify-content:space-between;gap:16px;align-items:flex-start}
    .title{margin:0 0 8px;font-size:18px;line-height:1.35}
    .meta,.chips{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
    .meta{margin:0 0 10px;color:var(--muted);font-size:12px}
    .badge{display:inline-flex;align-items:center;min-height:24px;border:1px solid var(--border);border-radius:999px;padding:2px 8px;background:#f7f8f6;color:var(--muted);font-size:12px;max-width:100%}
    .badge.catb{border-color:rgba(15,118,110,.24);color:var(--accent);background:rgba(15,118,110,.08)}
    .badge.st{border-color:rgba(180,83,9,.25);color:#7c4a03;background:#fffbeb}
    .badge.dirty{border-color:rgba(180,83,9,.32);color:#7c2d12;background:#fff7ed}
    .health-ok{border-color:rgba(21,128,61,.3);color:var(--ok);background:#f0fdf4}
    .health-pending{border-color:rgba(180,83,9,.28);color:var(--warn);background:#fffbeb}
    .health-broken{border-color:rgba(185,28,28,.28);color:var(--danger);background:#fef2f2}
    .health-local{border-color:rgba(15,118,110,.26);color:var(--accent);background:#ecfeff}
    .summary{margin:0 0 12px;color:#353936;font-size:14px}
    .label{margin:12px 0 6px;color:var(--muted);font-size:12px;font-weight:700}
    details.prompt-body{border-top:1px solid var(--border);background:#fbfcfb}
    details.prompt-body summary{padding:12px 16px;cursor:pointer;color:var(--accent);font-weight:700;font-size:13px}
    pre{margin:0;padding:0 16px 16px;max-height:68vh;overflow:auto;white-space:pre-wrap;word-break:break-word;font:13px/1.72 "Microsoft YaHei",Arial,sans-serif}
    code,.path-text{font-family:ui-monospace,SFMono-Regular,Consolas,"Liberation Mono",monospace}
    .empty{padding:30px;border:1px dashed var(--border);border-radius:var(--r);background:#fff;color:var(--muted);text-align:center}
    .load-more{margin-top:12px;padding:14px;border:1px solid var(--border);border-radius:var(--r);background:#fff;display:flex;justify-content:space-between;gap:12px;align-items:center;box-shadow:var(--shadow)}
    .load-more span{color:var(--muted);font-size:13px}
    .load-more button{min-width:128px}
    .importer{border-style:dashed;border-color:rgba(15,118,110,.45);background:var(--soft2);padding:16px;margin-bottom:12px;display:grid;gap:10px}
    .importer.drag{background:#e8f4f2;border-color:var(--accent)}
    .import-title{font-weight:800}
    .import-row{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
    .import-note,.import-result{color:var(--muted);font-size:13px}
    .import-result strong{color:#25534e}
    .asset-filter-panel{border-top:1px solid var(--border);padding-top:10px;display:grid;gap:10px}
    .filter-title{font-size:12px;font-weight:800;color:var(--muted)}
    .asset-toolbar{padding:12px;margin-bottom:12px;display:grid;gap:12px}
    .asset-overview{display:grid;grid-template-columns:repeat(5,minmax(110px,1fr));gap:8px}
    .mini-stat{border:1px solid var(--border);border-radius:var(--r);background:#fbfcfb;padding:10px;min-width:0}
    .mini-stat strong{display:block;font-size:18px;line-height:1.2}
    .mini-stat span{display:block;color:var(--muted);font-size:12px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .batchbar{padding:12px;margin-bottom:12px;display:grid;gap:10px;background:#fff}
    .batch-row{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
    .batch-row .batch-input{max-width:220px}
    .asset-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(286px,1fr));gap:12px}
    .asset-card{display:grid;grid-template-rows:190px auto}
    .asset-card.selected{outline:2px solid rgba(15,118,110,.38);outline-offset:2px}
    .asset-thumb{position:relative;background:#eef0ee;border-bottom:1px solid var(--border);overflow:hidden;color:var(--muted)}
    .thumb-button{width:100%;height:100%;min-height:0;border:0;border-radius:0;background:transparent;padding:0;display:block}
    .thumb-button:hover{background:#e8ece8}
    .thumb-button img{width:100%;height:100%;object-fit:cover;display:block}
    .preview-missing,.preview-error{height:100%;display:flex;align-items:center;justify-content:center;text-align:center;padding:12px;color:var(--muted);font-size:13px}
    .asset-check{position:absolute;left:8px;top:8px;z-index:2;display:inline-flex;gap:6px;align-items:center;border:1px solid rgba(255,255,255,.7);border-radius:999px;background:rgba(255,255,255,.9);padding:5px 8px;font-size:12px;color:var(--text)}
    .asset-check input{width:16px;height:16px;min-height:0;padding:0}
    .asset-health{position:absolute;right:8px;top:8px;z-index:2;box-shadow:0 4px 12px rgba(0,0,0,.08)}
    .asset-title-row{display:flex;justify-content:space-between;gap:10px;align-items:flex-start}
    .asset-title-row .title{font-size:16px}
    .asset-path{display:block;max-width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .asset-card-actions{display:grid;grid-template-columns:1fr auto auto;gap:8px;align-items:start;margin-top:12px}
    .asset-more{position:relative}
    .asset-more summary{list-style:none}
    .asset-more summary::-webkit-details-marker{display:none}
    .menu-summary{min-height:38px;border:1px solid var(--border);border-radius:var(--r);background:#fff;padding:7px 11px;display:inline-flex;align-items:center;justify-content:center;cursor:pointer;font-size:13px}
    .asset-more[open] .menu-summary{border-color:var(--accent);color:var(--accent)}
    .menu-panel{position:absolute;right:0;top:44px;z-index:12;width:210px;border:1px solid var(--border);border-radius:var(--r);background:#fff;box-shadow:0 16px 44px rgba(22,31,27,.16);padding:8px;display:grid;gap:6px}
    .menu-panel button{width:100%;justify-content:flex-start}
    .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    .full{grid-column:1/-1}
    label{display:grid;gap:6px;color:var(--muted);font-size:12px;font-weight:700}
    dialog{width:min(900px,calc(100vw - 28px));max-height:calc(100vh - 28px);border:1px solid var(--border);border-radius:var(--r);padding:0;box-shadow:0 24px 80px rgba(22,31,27,.24)}
    dialog::backdrop{background:rgba(20,25,22,.42)}
    .dh,.df{display:flex;justify-content:space-between;gap:12px;align-items:center;padding:14px 16px;border-bottom:1px solid var(--border);background:var(--soft)}
    .dh h3{margin:0;font-size:18px}
    .db{padding:16px;max-height:calc(100vh - 160px);overflow:auto}
    .df{justify-content:flex-end;border-top:1px solid var(--border);border-bottom:0;background:#fff}
    .viewer{width:min(1100px,calc(100vw - 28px))}
    .viewer .db{padding:0;background:#111;text-align:center}
    .viewer img{max-width:100%;max-height:calc(100vh - 140px);display:block;margin:auto}
    .detail-layout{display:grid;grid-template-columns:minmax(260px,45%) 1fr;gap:16px}
    .detail-preview{border:1px solid var(--border);border-radius:var(--r);background:#f0f2ef;overflow:hidden;min-height:220px;display:flex;align-items:center;justify-content:center}
    .detail-preview img{width:100%;height:100%;max-height:520px;object-fit:contain;background:#111}
    .detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    .detail-item{border:1px solid var(--border);border-radius:var(--r);background:#fbfcfb;padding:10px;min-width:0}
    .detail-item span{display:block;color:var(--muted);font-size:12px}
    .detail-item strong{display:block;margin-top:2px;word-break:break-word}
    .detail-actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}
    .stats{display:grid;grid-template-columns:repeat(4,minmax(120px,1fr));gap:10px}
    .stat{border:1px solid var(--border);border-radius:var(--r);background:#fbfcfb;padding:12px}
    .stat strong{display:block;font-size:22px;line-height:1.2}
    .stat span{color:var(--muted);font-size:12px}
    .panel{padding:16px;display:grid;gap:14px}
    .toast{position:fixed;right:20px;bottom:20px;z-index:50;max-width:min(520px,calc(100vw - 40px));padding:12px 14px;border-radius:var(--r);background:#202421;color:#fff;box-shadow:var(--shadow);opacity:0;transform:translateY(12px);pointer-events:none;transition:.18s;font-size:13px}
    .toast.show{opacity:1;transform:translateY(0)}
    @media(max-width:1080px){.asset-overview{grid-template-columns:repeat(3,minmax(110px,1fr))}.detail-layout{grid-template-columns:1fr}}
    @media(max-width:980px){.top{grid-template-columns:1fr;padding:16px}.tabs{justify-content:flex-start}main{grid-template-columns:1fr;padding:16px}aside{position:static}.head,.card-top{align-items:flex-start;flex-direction:column}.actions,.card-top button{width:100%}.actions button{flex:1}.form-grid{grid-template-columns:1fr}.stats{grid-template-columns:repeat(2,minmax(120px,1fr))}}
    @media(max-width:620px){body{min-height:100dvh}header{position:sticky;top:0}.top{gap:10px;padding:max(12px,env(safe-area-inset-top)) 12px 10px}h1{font-size:20px}.sub{font-size:12px}.tabs{display:flex;flex-wrap:nowrap;justify-content:flex-start;overflow-x:auto;padding-bottom:2px;scrollbar-width:none}.tabs::-webkit-scrollbar{display:none}.tab{flex:0 0 auto;min-height:44px;padding:8px 12px}main{gap:12px;padding:12px 12px calc(20px + env(safe-area-inset-bottom))}.filters{gap:8px}.filters input,.filters button,input,textarea,select,button,.buttonlike{min-height:44px}.cat{min-height:44px}.head{gap:10px;margin-bottom:10px}.actions{display:grid;grid-template-columns:1fr 1fr;gap:8px;width:100%;justify-content:stretch}.actions button{width:100%;min-width:0}.card-main{padding:12px}.title{font-size:16px}.card-top .actions{grid-template-columns:1fr}.load-more{display:grid;grid-template-columns:1fr}.load-more button{width:100%}.asset-overview{grid-template-columns:1fr 1fr}.asset-grid{grid-template-columns:1fr}.asset-card{grid-template-rows:210px auto}.asset-card-actions{grid-template-columns:1fr 1fr}.asset-card-actions .primary{grid-column:1/-1}.menu-panel{position:static;width:100%;margin-top:6px;box-shadow:none}.batch-row{display:grid;grid-template-columns:1fr 1fr;width:100%}.batch-row .batch-input{max-width:none}.stats{grid-template-columns:1fr 1fr}.panel{padding:12px}.panel .actions[style]{grid-template-columns:1fr}.panel input[type=file]{max-width:100%!important}.toast{right:12px;bottom:max(12px,env(safe-area-inset-bottom));max-width:calc(100vw - 24px)}dialog{width:calc(100vw - 20px);max-height:calc(100dvh - 20px)}dialog.detail-drawer{width:100vw;max-width:100vw;max-height:92dvh;margin:auto auto 0;border-radius:12px 12px 0 0}.db{max-height:calc(100dvh - 150px);padding:12px}.dh,.df{padding:12px}.df{display:grid;grid-template-columns:1fr 1fr}.viewer img{max-height:calc(100dvh - 130px)}pre{max-height:60dvh}.detail-grid{grid-template-columns:1fr}.detail-actions{display:grid;grid-template-columns:1fr 1fr}.detail-actions button{width:100%}}
  </style>
</head>
<body>
  <header>
    <div class="top">
      <div>
        <h1>提示词网页仓库 <span class="mode badge" id="modeBadge"></span></h1>
        <p class="sub" id="sub">正在读取共享提示词库...</p>
      </div>
      <nav class="tabs" aria-label="主导航">
        <button class="tab active" data-view="prompts">提示词库</button>
        <button class="tab" data-view="assets">图片素材</button>
        <button class="tab" data-view="archive">归档</button>
        <button class="tab" data-view="backup">个人备份</button>
      </nav>
    </div>
  </header>
  <main>
    <aside>
      <div class="ah"><span id="asideTitle">筛选</span><span class="pill" id="visibleCount">0</span></div>
      <div class="filters">
        <input id="search" type="search" placeholder="搜索标题、分类、标签、变量或正文">
        <button id="clearSearch">清空搜索</button>
        <div id="categoryList"></div>
      </div>
      <div class="notice" id="notice">共享数据由 GitHub 仓库提供。普通访问者只能查看、搜索和复制。</div>
    </aside>
    <section>
      <div class="head">
        <h2 id="resultTitle">全部提示词</h2>
        <div class="actions" id="contentActions"></div>
      </div>
      <div id="content"><div class="empty">正在加载共享库...</div></div>
    </section>
  </main>

  <dialog id="promptDialog">
    <form method="dialog" id="promptForm">
      <div class="dh"><h3 id="promptDialogTitle">新增提示词</h3><button type="button" data-close="promptDialog">关闭</button></div>
      <div class="db">
        <input type="hidden" name="id">
        <div class="form-grid">
          <label>标题<input name="title" required></label>
          <label>分类<input name="category" required></label>
          <label>状态<input name="status" placeholder="推荐 / 待优化 / 待验证"></label>
          <label>来源<input name="source" placeholder="手动新增"></label>
          <label class="full">标签（逗号分隔）<input name="tags"></label>
          <label class="full">变量（逗号分隔）<input name="variables"></label>
          <label class="full">摘要<textarea name="summary" rows="3"></textarea></label>
          <label class="full">提示词正文<textarea name="body" required rows="14"></textarea></label>
        </div>
      </div>
      <div class="df"><button type="button" data-close="promptDialog">取消</button><button class="primary" type="submit">保存到草稿</button></div>
    </form>
  </dialog>

  <dialog id="assetDialog">
    <form method="dialog" id="assetForm">
      <div class="dh"><h3 id="assetDialogTitle">编辑图片素材</h3><button type="button" data-close="assetDialog">关闭</button></div>
      <div class="db">
        <input type="hidden" name="id">
        <div class="form-grid">
          <label>标题<input name="title" required></label>
          <label>分类<input name="category" required></label>
          <label class="full">标签（逗号分隔）<input name="tags"></label>
          <label class="full">用途说明<textarea name="notes" rows="5"></textarea></label>
          <label class="full">关联提示词<select name="relatedPromptIds" multiple size="7" id="relatedPromptSelect"></select></label>
        </div>
      </div>
      <div class="df"><button type="button" data-close="assetDialog">取消</button><button class="primary" type="submit">保存到草稿</button></div>
    </form>
  </dialog>

  <dialog id="assetDetailDialog" class="detail-drawer">
    <div class="dh"><h3 id="assetDetailTitle">素材详情</h3><button type="button" data-close="assetDetailDialog">关闭</button></div>
    <div class="db" id="assetDetailBody"></div>
  </dialog>

  <dialog id="viewerDialog" class="viewer">
    <div class="dh"><h3 id="viewerTitle">查看原图</h3><button type="button" data-close="viewerDialog">关闭</button></div>
    <div class="db"><img id="viewerImage" alt=""></div>
  </dialog>

  <div class="toast" id="toast"></div>

  <script>
const API_LIBRARY='/api/prompts/library',API_ASSETS='/api/prompts/assets';
const TYPES=['image/jpeg','image/png','image/webp','image/gif','image/svg+xml'],EXT=/\.(jpe?g|png|webp|gif|svg)$/i;
const IS_ADMIN=location.pathname.replace(/\/+$/,'').startsWith('/prompts/admin');
const SECRET_WORDS=['sk-'+'proj-','github'+'_pat_','gh'+'p_'];
const VIEWS=new Set(['prompts','assets','archive','backup']);
const DEFAULT_ASSET_FILTERS={format:'all',ratio:'all',dimension:'all',link:'all',health:'all',sort:'updated-desc'};
const PROMPT_PAGE_SIZE=80;
const localPreviewUrls=new Map(),assetHealthOverrides=new Map();
let selectedAssets=new Set(),baselineAssets=new Map(),uploadSummary=null;
let store=norm({prompts:[],assets:[]}),loading=true,draftDirty=false,publishing=false,healthRenderTimer=null,promptVisibleLimit=PROMPT_PAGE_SIZE,expandPromptsAfterRender=false;
let state=initialState();
const $=id=>document.getElementById(id),E={mode:$('modeBadge'),notice:$('notice'),sub:$('sub'),tabs:document.querySelectorAll('.tab'),aside:$('asideTitle'),vc:$('visibleCount'),search:$('search'),cat:$('categoryList'),title:$('resultTitle'),actions:$('contentActions'),content:$('content'),toast:$('toast'),pd:$('promptDialog'),pf:$('promptForm'),pt:$('promptDialogTitle'),ad:$('assetDialog'),af:$('assetForm'),at:$('assetDialogTitle'),rs:$('relatedPromptSelect'),dd:$('assetDetailDialog'),db:$('assetDetailBody'),dt:$('assetDetailTitle'),vd:$('viewerDialog'),vi:$('viewerImage'),vt:$('viewerTitle')};
function resetPromptPaging(){promptVisibleLimit=PROMPT_PAGE_SIZE;expandPromptsAfterRender=false}
E.search.value=state.query;
function initialState(){let q=new URLSearchParams(location.search),view=q.get('view')||'prompts';return{view:VIEWS.has(view)?view:'prompts',category:q.get('cat')||'全部',query:q.get('q')||'',multiSelect:false,asset:{format:q.get('fmt')||DEFAULT_ASSET_FILTERS.format,ratio:q.get('ratio')||DEFAULT_ASSET_FILTERS.ratio,dimension:q.get('dim')||DEFAULT_ASSET_FILTERS.dimension,link:q.get('link')||DEFAULT_ASSET_FILTERS.link,health:q.get('health')||DEFAULT_ASSET_FILTERS.health,sort:q.get('sort')||DEFAULT_ASSET_FILTERS.sort}}}
function syncUrl(){let p=new URLSearchParams(location.search);['view','q','cat','fmt','ratio','dim','link','health','sort'].forEach(k=>p.delete(k));if(state.view!=='prompts')p.set('view',state.view);if(state.query)p.set('q',state.query);if(state.category&&state.category!=='全部')p.set('cat',state.category);if(state.view==='assets'){let a=state.asset;if(a.format!=='all')p.set('fmt',a.format);if(a.ratio!=='all')p.set('ratio',a.ratio);if(a.dimension!=='all')p.set('dim',a.dimension);if(a.link!=='all')p.set('link',a.link);if(a.health!=='all')p.set('health',a.health);if(a.sort!=='updated-desc')p.set('sort',a.sort)}let qs=p.toString();history.replaceState(null,'',location.pathname+(qs?'?'+qs:'')+location.hash)}
function now(){let d=new Date(),p=n=>String(n).padStart(2,'0');return `${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())} ${p(d.getHours())}:${p(d.getMinutes())}:${p(d.getSeconds())}`}

function downloadBlob(data,name,type){let blob=new Blob([data],{type}),u=URL.createObjectURL(blob);downloadUrl(u,name);setTimeout(()=>URL.revokeObjectURL(u),1000)}
function safeName(v){return String(v||'asset').replace(/[\\/:*?"<>|]+/g,'-').slice(0,80)}
async function copyText(t,msg){try{navigator.clipboard?.writeText?await navigator.clipboard.writeText(t):fallback(t)}catch(e){fallback(t)}toast(msg||'已复制')}
function fallback(t){let x=document.createElement('textarea');x.value=t;x.style.position='fixed';x.style.left='-9999px';document.body.appendChild(x);x.select();document.execCommand('copy');x.remove()}
function runAssetAction(act,id){let a=asset(id);if(!a)return;if(act==='detail')showAssetDetail(id);else if(act==='copy-image')copyAssetImage(id);else if(act==='copy-path')copyText(assetPublicPath(a)||assetPath(a),`已复制路径：${a.title}`);else if(act==='copy-markdown')copyText(assetMarkdown(a),`已复制 Markdown：${a.title}`);else if(act==='copy-package')copyText(assetCallPackage(a),`已复制调用包：${a.title}`);else if(act==='download')downloadAsset(a);else if(act==='open')openOriginal(a);else if(act==='edit')openAsset(id);else if(act==='delete')deleteAsset(id)}
function hasPossibleSecret(){let t=JSON.stringify(publicLibrary());return SECRET_WORDS.some(w=>t.includes(w))||/\bsk-[A-Za-z0-9_-]{20,}\b/i.test(t)}
async function publishLibrary(){if(!IS_ADMIN||publishing||!draftDirty)return;if(hasPossibleSecret()){toast('草稿中疑似包含密钥，已阻止发布');return}publishing=true;render();try{let res=await fetch(API_LIBRARY,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({library:publicLibrary(),message:'Update prompt library'})}),data=await res.json().catch(()=>({}));if(!res.ok||!data.ok)throw new Error(data.error||`HTTP ${res.status}`);draftDirty=false;uploadSummary=null;snapshotAssets();toast('已提交到 GitHub，等待自动部署完成后公开生效')}catch(e){toast(`发布失败：${e.message||e}`)}finally{publishing=false;render()}}
function blobToDataUrl(blob){return new Promise((res,rej)=>{let r=new FileReader();r.onload=()=>res(r.result);r.onerror=()=>rej(r.error);r.readAsDataURL(blob)})}
function dataUrlToBlob(url){let [h,b]=url.split(','),mime=(h.match(/data:(.*?);base64/)||[])[1]||'application/octet-stream',bin=atob(b),u=new Uint8Array(bin.length);for(let i=0;i<bin.length;i++)u[i]=bin.charCodeAt(i);return new Blob([u],{type:mime})}
async function exportJson(full){let payload={version:2,backupType:full?'full':'lite',backupScope:'personal',exportedAt:now(),store:publicLibrary(),images:[]};if(full){for(let a of store.assets){try{let src=assetUrl(a);if(!src)continue;let b=await fetch(src,{cache:'no-store'}).then(r=>r.ok?r.blob():null);if(b)payload.images.push({id:a.id,type:b.type,size:b.size,dataUrl:await blobToDataUrl(b)})}catch(e){console.warn(e)}}}downloadBlob(JSON.stringify(payload,null,2),`提示词网页仓库个人${full?'完整':'轻量'}备份-${new Date().toISOString().slice(0,10)}.json`,'application/json;charset=utf-8');toast(full?'个人完整备份已导出':'个人轻量备份已导出')}
async function importJson(){let file=$('importJson')?.files?.[0];if(!file){toast('请先选择 JSON 文件');return}let msg=IS_ADMIN?'导入会替换当前管理员草稿，不会立即改写公共库。确认继续？':'导入会把当前页面切换为这个备份的本机视图，不会写入公共库。确认继续？';if(!confirm(msg))return;try{let raw=JSON.parse(await file.text());if(!raw||(!raw.store&&!raw.prompts&&!raw.assets))throw new Error('JSON 不包含提示词库数据');let next=norm(raw.store||raw),images=new Map(list(raw.images).map(img=>[img.id,img]));for(let a of next.assets){let img=images.get(a.id)||images.get(a.blobId)||images.get(a.thumbBlobId);if(!img?.dataUrl)continue;if(IS_ADMIN&&!a.src){let uploaded=await uploadAssetBlob(dataUrlToBlob(img.dataUrl),{fileName:a.fileName||`${a.title}.png`,title:a.title,category:a.category,notes:a.notes,width:a.width,height:a.height});Object.assign(a,uploaded,{id:a.id,title:a.title,category:a.category,tags:a.tags,notes:a.notes,relatedPromptIds:a.relatedPromptIds})}else if(!IS_ADMIN){setLocalPreview(a.id,URL.createObjectURL(dataUrlToBlob(img.dataUrl)))}}store=next;state.view='prompts';state.category='全部';state.query='';E.search.value='';draftDirty=IS_ADMIN;if(!IS_ADMIN)snapshotAssets();syncUrl();render();toast(IS_ADMIN?'已导入为管理员草稿，请检查后发布':'已导入个人备份到当前浏览器，不会改写公共库')}catch(e){console.error(e);toast(`导入失败：${e.message||'JSON 格式不正确或图片数据损坏'}`)}}
let tt;function toast(m){E.toast.textContent=m;E.toast.classList.add('show');clearTimeout(tt);tt=setTimeout(()=>E.toast.classList.remove('show'),2600)}
E.tabs.forEach(t=>t.onclick=()=>{state.view=t.dataset.view;state.category='全部';selectedAssets.clear();resetPromptPaging();if(state.view!=='assets')state.multiSelect=false;syncUrl();render()});
E.search.oninput=()=>{state.query=E.search.value;resetPromptPaging();syncUrl();render()};
$('clearSearch').onclick=()=>{E.search.value='';state.query='';resetPromptPaging();syncUrl();render();E.search.focus()};
document.querySelectorAll('[data-close]').forEach(b=>b.onclick=()=>$(b.dataset.close).close());
document.addEventListener('click',e=>{let b=e.target.closest('[data-asset-act]');if(!b)return;e.preventDefault();runAssetAction(b.dataset.assetAct,b.dataset.assetId);b.closest('details.asset-more')?.removeAttribute('open')});
E.vd.addEventListener('close',()=>{E.vi.removeAttribute('src')});
E.pf.onsubmit=savePrompt;
E.af.onsubmit=saveAsset;
window.addEventListener('beforeunload',()=>localPreviewUrls.forEach(u=>URL.revokeObjectURL(u)));
loadLibrary();
  </script>
