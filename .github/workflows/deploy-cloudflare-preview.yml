name: Deploy Preview Worker

run-name: Deploy Preview Worker (${{ inputs.ref || 'codex/homepage-visual-upgrade-preview' }})

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref to deploy to the preview Worker
        required: false
        default: codex/homepage-visual-upgrade-preview
        type: string

permissions:
  contents: read

concurrency:
  group: deploy-cloudflare-worker-preview
  cancel-in-progress: false

jobs:
  deploy-preview:
    name: Deploy preview Worker
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      DEFAULT_PREVIEW_REF: codex/homepage-visual-upgrade-preview
      PREVIEW_WORKER_NAME: floral-leaf-4e44-preview
      PREVIEW_URL: https://floral-leaf-4e44-preview.2453193338.workers.dev/
      CLOUDFLARE_ACCOUNT_ID: 8ad8f870010a1f1de2a2bf7ca8220d4a

    steps:
      - name: Checkout selected ref
        uses: actions/checkout@v6.0.2
        with:
          ref: ${{ inputs.ref || 'codex/homepage-visual-upgrade-preview' }}

      - name: Record deploy commit
        id: commit
        run: |
          set -euo pipefail
          deploy_commit="$(git rev-parse HEAD)"
          echo "sha=${deploy_commit}" >> "$GITHUB_OUTPUT"
          echo "short_sha=${deploy_commit:0:7}" >> "$GITHUB_OUTPUT"

      - name: Setup Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install ffmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Validate prompt library
        run: npm run validate:prompts

      - name: Build app bundle
        run: npm run build:app

      - name: Prepare static bundle
        run: npm run prepare:static

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Verify Wrangler
        run: npx wrangler --version

      - name: Verify preview deploy guard
        run: |
          set -euo pipefail
          node <<'NODE'
          import { readFileSync } from "node:fs";

          const packageJson = JSON.parse(readFileSync("package.json", "utf8"));
          const deployPreview = String(packageJson.scripts?.["deploy:preview"] || "");
          const wranglerConfig = JSON.parse(readFileSync("wrangler.jsonc", "utf8"));
          const forbidden = [
            "www.zhangweivisual.cn",
            "zhangweivisual.cn",
            "--route",
            "--routes",
            "--domain",
            "--domains"
          ];
          const deploymentSurface = [
            deployPreview,
            JSON.stringify(wranglerConfig.route || ""),
            JSON.stringify(wranglerConfig.routes || ""),
            JSON.stringify(wranglerConfig.domain || ""),
            JSON.stringify(wranglerConfig.domains || ""),
            JSON.stringify(wranglerConfig.custom_domain || ""),
            JSON.stringify(wranglerConfig.custom_domains || "")
          ].join("\n");

          if (!deployPreview.includes("--name floral-leaf-4e44-preview")) {
            throw new Error("deploy:preview must deploy with --name floral-leaf-4e44-preview.");
          }
          for (const token of forbidden) {
            if (deploymentSurface.includes(token)) {
              throw new Error(`Preview deployment surface includes forbidden production binding: ${token}`);
            }
          }
          console.log("Preview deployment guard passed.");
          NODE

      - name: Create preview Worker secrets file
        env:
          PROMPT_LIBRARY_PASSWORD: ${{ secrets.PROMPT_LIBRARY_PASSWORD }}
          PROMPT_LIBRARY_ADMIN_PASSWORD: ${{ secrets.PROMPT_LIBRARY_ADMIN_PASSWORD }}
          PROMPTS_GITHUB_TOKEN: ${{ secrets.PROMPTS_GITHUB_TOKEN }}
          PORTFOLIO_ADMIN_PASSWORD: ${{ secrets.PORTFOLIO_ADMIN_PASSWORD }}
          PORTFOLIO_GITHUB_TOKEN: ${{ secrets.PORTFOLIO_GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          required=(
            PROMPT_LIBRARY_PASSWORD
            PROMPT_LIBRARY_ADMIN_PASSWORD
            PROMPTS_GITHUB_TOKEN
            PORTFOLIO_ADMIN_PASSWORD
            PORTFOLIO_GITHUB_TOKEN
          )
          missing=()
          for key in "${required[@]}"; do
            if [ -z "${!key:-}" ]; then
              missing+=("$key")
            fi
          done
          if [ "${#missing[@]}" -gt 0 ]; then
            printf 'Missing required secret: %s\n' "${missing[@]}"
            exit 1
          fi

          preview_secrets_file="$RUNNER_TEMP/preview-worker-secrets.json"
          node <<'NODE'
          import { writeFileSync } from "node:fs";

          const keys = [
            "PROMPT_LIBRARY_PASSWORD",
            "PROMPT_LIBRARY_ADMIN_PASSWORD",
            "PROMPTS_GITHUB_TOKEN",
            "PORTFOLIO_ADMIN_PASSWORD",
            "PORTFOLIO_GITHUB_TOKEN"
          ];
          const payload = Object.fromEntries(keys.map((key) => [key, process.env[key] || ""]));
          writeFileSync(`${process.env.RUNNER_TEMP}/preview-worker-secrets.json`, JSON.stringify(payload), {
            encoding: "utf8",
            mode: 0o600
          });
          NODE
          chmod 600 "$preview_secrets_file"
          echo "PREVIEW_SECRETS_FILE=$preview_secrets_file" >> "$GITHUB_ENV"

      - name: Deploy preview Worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${CLOUDFLARE_API_TOKEN:-}" ]; then
            echo "::error title=Missing Cloudflare API token::Set the CLOUDFLARE_API_TOKEN repository secret before deploying preview."
            exit 1
          fi
          npm run deploy:preview -- --secrets-file "$PREVIEW_SECRETS_FILE" --message "Preview deploy ${{ steps.commit.outputs.sha }}"

      - name: Remove preview Worker secrets file
        if: always()
        run: |
          if [ -n "${PREVIEW_SECRETS_FILE:-}" ]; then
            rm -f "$PREVIEW_SECRETS_FILE"
          fi

      - name: Summarize preview deployment
        run: |
          set -euo pipefail
          qa_url="${PREVIEW_URL}?qa=${{ steps.commit.outputs.short_sha }}-${GITHUB_RUN_ID}"
          actions_url="https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          {
            echo "## Preview Worker deployment"
            echo ""
            echo "- Preview URL: ${PREVIEW_URL}"
            echo "- QA URL: ${qa_url}"
            echo "- Actions URL: ${actions_url}"
            echo "- Commit hash: ${{ steps.commit.outputs.sha }}"
            echo "- Worker name: ${PREVIEW_WORKER_NAME}"
            echo "- Production touched: No"
            echo "- Production domain binding: Not configured"
          } >> "$GITHUB_STEP_SUMMARY"
