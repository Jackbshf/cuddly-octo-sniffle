name: Deploy To Cloudflare Worker

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install ffmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Sync Cloudflare Stream manifest
        env:
          CLOUDFLARE_STREAM_API_TOKEN: ${{ secrets.CLOUDFLARE_STREAM_API_TOKEN }}
          CLOUDFLARE_STREAM_ACCOUNT_ID: 8ad8f870010a1f1de2a2bf7ca8220d4a
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: 8ad8f870010a1f1de2a2bf7ca8220d4a
        run: |
          set -o pipefail
          if ! STREAM_OUTPUT=$(node scripts/media/sync-cloudflare-stream.mjs 2>&1); then
            echo "$STREAM_OUTPUT"
            STREAM_OUTPUT="${STREAM_OUTPUT//'%'/'%25'}"
            STREAM_OUTPUT="${STREAM_OUTPUT//$'\n'/'%0A'}"
            STREAM_OUTPUT="${STREAM_OUTPUT//$'\r'/'%0D'}"
            echo "::error title=Cloudflare Stream sync failed::$STREAM_OUTPUT"
            exit 1
          fi
          echo "$STREAM_OUTPUT"

      - name: Commit updated Stream manifest
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/cloudflare-stream-manifest.json
          if git diff --cached --quiet; then
            echo "No Stream manifest changes to commit."
            exit 0
          fi
          git commit -m "Update Cloudflare Stream manifest"
          git push

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Prepare static bundle
        run: node scripts/prepare-static.mjs

      - name: Install Wrangler
        run: npm install --global wrangler@latest

      - name: Configure Worker secrets
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: 8ad8f870010a1f1de2a2bf7ca8220d4a
          PROMPT_LIBRARY_PASSWORD: ${{ secrets.PROMPT_LIBRARY_PASSWORD }}
          PROMPT_LIBRARY_ADMIN_PASSWORD: ${{ secrets.PROMPT_LIBRARY_ADMIN_PASSWORD }}
          PROMPTS_GITHUB_TOKEN: ${{ secrets.PROMPTS_GITHUB_TOKEN }}
          PORTFOLIO_ADMIN_PASSWORD: ${{ secrets.PORTFOLIO_ADMIN_PASSWORD }}
          PORTFOLIO_GITHUB_TOKEN: ${{ secrets.PORTFOLIO_GITHUB_TOKEN }}
        run: |
          if [ -z "$PROMPT_LIBRARY_PASSWORD" ]; then
            echo "::error title=Missing prompt library password::Set the PROMPT_LIBRARY_PASSWORD repository secret before deploying."
            exit 1
          fi
          if [ -z "$PROMPT_LIBRARY_ADMIN_PASSWORD" ]; then
            echo "::error title=Missing prompt library admin password::Set the PROMPT_LIBRARY_ADMIN_PASSWORD repository secret before deploying."
            exit 1
          fi
          if [ -z "$PROMPTS_GITHUB_TOKEN" ]; then
            echo "::error title=Missing prompt GitHub token::Set the PROMPTS_GITHUB_TOKEN repository secret before deploying."
            exit 1
          fi
          if [ -z "$PORTFOLIO_ADMIN_PASSWORD" ]; then
            echo "::error title=Missing portfolio admin password::Set the PORTFOLIO_ADMIN_PASSWORD repository secret before deploying."
            exit 1
          fi
          if [ -z "$PORTFOLIO_GITHUB_TOKEN" ]; then
            echo "::error title=Missing portfolio GitHub token::Set the PORTFOLIO_GITHUB_TOKEN repository secret before deploying."
            exit 1
          fi
          printf '%s' "$PROMPT_LIBRARY_PASSWORD" | wrangler secret put PROMPT_LIBRARY_PASSWORD --config wrangler.jsonc
          printf '%s' "$PROMPT_LIBRARY_ADMIN_PASSWORD" | wrangler secret put PROMPT_LIBRARY_ADMIN_PASSWORD --config wrangler.jsonc
          printf '%s' "$PROMPTS_GITHUB_TOKEN" | wrangler secret put PROMPTS_GITHUB_TOKEN --config wrangler.jsonc
          printf '%s' "$PORTFOLIO_ADMIN_PASSWORD" | wrangler secret put PORTFOLIO_ADMIN_PASSWORD --config wrangler.jsonc
          printf '%s' "$PORTFOLIO_GITHUB_TOKEN" | wrangler secret put PORTFOLIO_GITHUB_TOKEN --config wrangler.jsonc

      - name: Deploy Worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: 8ad8f870010a1f1de2a2bf7ca8220d4a
        run: wrangler deploy --config wrangler.jsonc

      - name: Audit Stream delivery
        run: |
          sleep 10
          node scripts/media/audit-stream-delivery.mjs --site-url https://www.zhangweivisual.cn/ --output-file dist/stream-audit-summary.json

      - name: Upload Stream audit summary
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: stream-audit-summary
          path: dist/stream-audit-summary.json
